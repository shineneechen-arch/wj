<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="zh-CN">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>南江大学溯源BBS - 寻找旧日星火</title>
    <style type="text/css">
        /* 基础样式保留原版逻辑 */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #E2E8F1; color: #333333; font-family: "SimSun", "宋体", Arial, sans-serif; font-size: 14px; overflow-x: hidden; transition: background-color 1.5s; }
        table { font-size: 14px; border-collapse: collapse; }
        a { color: #004499; text-decoration: none; }
        a:hover { text-decoration: underline; color: #FF6600; }
        .bold { font-weight: bold; }
        .red { color: #FF0000; }
        .blue { color: #0000FF; }
        .gray { color: #888888; font-size: 12px; }
        #app-container { position: relative; width: 100%; min-height: 100vh; }
        .layer { width: 100%; transition: opacity 0.05s ease; }
        #layer-2026 { position: relative; z-index: 10; opacity: 1; }
        #layer-2007 { position: absolute; top: 0; left: 0; z-index: 20; opacity: 0; pointer-events: none; filter: contrast(1.2) sepia(0.3) hue-rotate(-10deg); }
        .main-wrap { width: 96%; min-width: 980px; margin: 15px auto; background-color: #FFFFFF; border: 1px solid #A6CBE7; padding: 18px; box-sizing: border-box; }
        .header-2026 { background-color: #245b84; padding: 25px 30px; margin: -18px -18px 15px -18px; color: #fff; }
        .logo { font-size: 28px; font-weight: bold; margin-bottom: 18px; }
        .nav a { color: #fff; }
        .nav span { margin: 0 12px; }
        .user-status-bar { background-color: #F5F9FD; border: 1px solid #A6CBE7; padding: 10px 14px; margin-bottom: 15px; }
        .info-stats { float: right; color: #444; }
        .top10-box { border: 1px solid #A6CBE7; margin-bottom: 18px; }
        .top10-title { background: #EBF2F8; padding: 8px 14px; font-weight: bold; border-bottom: 1px solid #A6CBE7; color: #336699; }
        .top10-list { padding: 12px 18px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .category-bar { background: #4A81B0; color: #FFFFFF; font-weight: bold; padding: 8px 14px; border: 1px solid #2B5E8A; margin-top: 15px; }
        .forum-table { width: 100%; border: 1px solid #A6CBE7; background-color: #FFF; }
        .forum-table td { border-bottom: 1px solid #E2E8F1; padding: 15px; }
        .footer { text-align: center; margin-top: 30px; padding: 20px 0; border-top: 1px solid #A6CBE7; color: #666; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 9999; }
        .login-box { width: 380px; margin: 200px auto; background: #FFF; border: 1px solid #2B618E; padding: 30px; }
        .hack-transition { position: fixed; inset: 0; background: #000; color: #0F0; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="layer-2026" class="layer">
        <div class="main-wrap" id="main-content-2026">
            <div class="header-2026">
                <div class="logo">南江大学 - 溯源BBS (Since 2004)</div>
                <div class="nav">
                    <a href="#">首 页</a> <span>|</span>
                    <a href="#" id="nav-control-panel" onclick="showLogin()">控制面板</a>
                </div>
            </div>
            <div class="user-status-bar" id="status-bar-2026">
                <span class="info-stats">系统时间: <span class="time-display"></span></span>
                欢迎您，<span class="bold blue">游客</span> ( <a href="#" onclick="showLogin()">登录</a> )
            </div>

            <div style="padding: 20px; text-align: center;">
                <a href="4dMirror.html" style="font-size: 20px; font-weight: bold; color: #D32F2F;">[ 访问溯源镜像服 ]</a>
            </div>

            <div class="footer">
                Powered by <span class="bold" style="color:#336699;">Discuz! <a href="4dMirror.html" style="color:#336699;">溯源镜像</a>服</span>
            </div>
        </div>
    </div>
</div>

<div id="login-modal" class="modal-overlay">
    <div class="login-box">
        <div style="margin-bottom: 20px;">系统安全校验</div>
        <input type="text" id="login-user" placeholder="授权账户" class="login-input"><br>
        <input type="password" id="login-pwd" placeholder="验证密钥" class="login-input"><br>
        <button onclick="checkHackPwd()">覆 写 (OVERRIDE)</button>
    </div>
</div>

<script type="text/javascript">
    // 拦截器逻辑：严格限定 4dMirror.html 访问权限
    (function bindClickInterceptor() {
        document.addEventListener('click', function(e) {
            const targetLink = e.target.closest('a');
            if (!targetLink) return;

            const href = targetLink.getAttribute('href');
            if (!href || href === '#' || href.startsWith('javascript:')) return;

            const isGod = localStorage.getItem('god_perspective_unlocked') === 'true';
            const isLogged = localStorage.getItem('njdx_bbs_override') === 'true';

            // 权限校验逻辑
            if (href.includes('4dMirror.html')) {
                if (!isGod) {
                    e.preventDefault();
                    e.stopPropagation();
                    alert("【SECURITY ALERT：权限层级不足】\n\n溯源镜像服仅对 [不可名状的观测者] 开放。\n请先完成高维同化。");
                    return;
                }
            }

            if (!isLogged && !isGod) {
                e.preventDefault();
                e.stopPropagation();
                showLogin();
            }
        }, { capture: true });
    })();

    function showLogin() {
        if(localStorage.getItem('njdx_bbs_override') === 'true' || localStorage.getItem('god_perspective_unlocked') === 'true') return;
        document.getElementById('login-modal').style.display = 'block';
    }

    function checkHackPwd() {
        const user = document.getElementById('login-user').value.trim();
        const pwd = document.getElementById('login-pwd').value.trim();
        
        // 普通登录
        if(user === '26级_既济' && pwd === '101010') {
            localStorage.setItem('njdx_bbs_override', 'true');
            window.location.reload();
        } 
        // 核心登录：开启观测者视角
        else if(user === 'Admin' && pwd === 'GodMode') {
            localStorage.setItem('god_perspective_unlocked', 'true');
            window.location.reload();
        } else {
            alert("验证失败");
        }
    }

    function updateTime() {
        const now = new Date();
        document.querySelectorAll('.time-display').forEach(d => d.innerText = now.toLocaleString());
    }
    setInterval(updateTime, 1000);
    updateTime();
</script>
</body>
</html>
