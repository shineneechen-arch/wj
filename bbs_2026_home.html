<script type="text/javascript">
    // ================= 真实时间同步 =================
    function updateTime() {
        const now = new Date();
        const timeStr = now.getFullYear() + "-" + 
                        (now.getMonth() + 1).toString().padStart(2, '0') + "-" + 
                        now.getDate().toString().padStart(2, '0') + " " + 
                        now.getHours().toString().padStart(2, '0') + ":" + 
                        now.getMinutes().toString().padStart(2, '0') + ":" + 
                        now.getSeconds().toString().padStart(2, '0');
        document.querySelectorAll('.time-display').forEach(d => d.innerText = timeStr);
    }
    setInterval(updateTime, 1000);
    updateTime();

    // ================= 全局状态控制与【真·恐怖频闪】逻辑 =================
    const layer2026 = document.getElementById('layer-2026');
    const layer2007 = document.getElementById('layer-2007');
    const glitchOverlay = document.getElementById('glitch-overlay');
    let isGlitching = true;
    let flashTimeout;

    // 当页面加载时，检查是否已经登录过
    window.onload = function() {
        if(localStorage.getItem('njdx_bbs_override') === 'true') {
            applyLoggedInState(false); // 不播放黑屏动画，直接保持登录
        } else {
            // 没有登录，开始随机频闪
            triggerRandomGlitch();
        }
    };

    // 随机频闪触发器 (极速闪烁一帧 2007 画面)
    function triggerRandomGlitch() {
        if (!isGlitching) return;

        // 随机等待 2秒 到 6秒 触发一次闪烁
        const nextGlitchTime = 2000 + Math.random() * 4000;
        
        flashTimeout = setTimeout(() => {
            if (!isGlitching) return;

            // 瞬间切到 2007 图层，并带上雪花屏
            layer2026.style.opacity = '0';
            layer2007.style.opacity = '1';
            glitchOverlay.style.opacity = '1';

            // 仅仅闪烁 0.1秒 到 0.3秒 后，瞬间切回正常页面
            setTimeout(() => {
                if (!isGlitching) return;
                layer2026.style.opacity = '1';
                layer2007.style.opacity = '0';
                glitchOverlay.style.opacity = '0';
                
                // 循环下一次随机闪烁
                triggerRandomGlitch();
            }, 100 + Math.random() * 200);

        }, nextGlitchTime);
    }

    // ================= 登录与持久化接管逻辑 =================
    function showLogin() {
        // 如果已经登录，不弹框
        if(localStorage.getItem('njdx_bbs_override') === 'true') {
            return;
        }
        document.getElementById('error').style.display = 'none';
        document.getElementById('login-modal').style.display = 'block';
        document.getElementById('login-user').focus();
    }

    function checkHackPwd() {
        const user = document.getElementById('login-user').value.trim();
        const pwd = document.getElementById('login-pwd').value.trim();
        
        // 核心密码：26级_既济 / 101010
        if(user === '26级_既济' && pwd === '101010') {
            // 写入本地存储，实现状态持久化
            localStorage.setItem('njdx_bbs_override', 'true');
            
            document.getElementById('login-modal').style.display = 'none';
            applyLoggedInState(true); // 播放接管动画
        } else {
            document.getElementById('error').style.display = 'block';
        }
    }

    // 核心函数：应用登录定格状态
    function applyLoggedInState(playAnimation) {
        // 1. 停止一切闪烁
        isGlitching = false;
        if(flashTimeout) clearTimeout(flashTimeout);
        
        // 2. 强制锁死在 2026 页面
        layer2007.style.display = 'none';
        layer2026.style.opacity = '1';
        layer2026.style.pointerEvents = 'auto';
        glitchOverlay.style.opacity = '0';

        // 3. 执行状态变更
        const doUpdateUI = () => {
            document.getElementById('status-bar-2026').innerHTML = `
                <span class="info-stats" style="color:#D32F2F; font-weight:bold;">SYS_OVERRIDE: 维度已锚定</span>
                欢迎回来，<span class="bold red" style="font-size:16px;">26级_既济 (高维观测者)</span> 
                &nbsp;&nbsp;&nbsp;现实时间: <span class="bold time-display"></span>
            `;
            updateTime();
            
            // 避免重复插入广播
            if(!document.getElementById('success-broadcast')) {
                const mainWrap = document.getElementById('main-content-2026');
                const successMsg = document.createElement('div');
                successMsg.id = 'success-broadcast';
                successMsg.style.cssText = "background: #E8F5E9; border: 1px solid #4CAF50; padding: 15px; margin-bottom: 20px; color: #2E7D32; font-weight: bold; font-size: 15px; text-align: center; box-shadow: 0 0 10px rgba(76, 175, 80, 0.3);";
                successMsg.innerHTML = "【系统广播】权限覆盖完毕。19年前的散逸算力已被安全重定向。<br>时空死局已解，南江大学节点恢复正常运转。感谢您的介入。<br><br><span style='font-size:12px; color:#666; cursor:pointer;' onclick='resetGame()'>[点击此处可重置游戏状态并刷新]</span>";
                mainWrap.insertBefore(successMsg, mainWrap.children[1]);
            }
            
            const cpLink = document.getElementById('nav-control-panel');
            cpLink.innerHTML = "控制面板 (已解锁)";
            cpLink.style.color = "#FF0000";
            cpLink.onclick = function() { window.location.href = "bbs_admin.html"; };
        };

        if (playAnimation) {
            const overlay = document.createElement('div');
            overlay.className = 'hack-transition';
            overlay.innerHTML = '<h1 style="font-size:36px; margin-bottom:10px;">[ TIME PARADOX STABILIZED ]</h1><p style="font-size:18px;">阵列逆转完成。<br>实体覆盖为：26_既济</p><p style="color:#0f0; font-size:24px; font-weight:bold; margin-top:30px;">正在接管 2026 年当前维度节点...</p>';
            document.body.appendChild(overlay);
            
            setTimeout(() => { 
                document.body.removeChild(overlay);
                doUpdateUI();
            }, 3000);
        } else {
            doUpdateUI();
        }
    }

    // 后门：重置游戏状态
    function resetGame() {
        localStorage.removeItem('njdx_bbs_override');
        window.location.reload();
    }

    document.getElementById('login-pwd').addEventListener('keydown', function(e) {
        if(e.key === 'Enter') checkHackPwd();
    });
</script>
