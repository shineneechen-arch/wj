<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>六爻排盘 - ZenCode</title>
    <!-- 引入日历与截图依赖 -->
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* --- ZenCode 核心视觉体系 --- */
        :root {
            --zc-bg-main: #050505;
            --zc-bg-panel: #0d0c11;
            --zc-gold-light: #e6c587;
            --zc-gold-dark: #8a7342;
            --zc-text-main: #b3b3b3;
            --zc-text-muted: #666666;
            --zc-border: #2a2a35;
        }

        body {
            background-color: var(--zc-bg-main);
            color: var(--zc-text-main);
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            margin: 0; padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 粒子太极引擎底层 */
        #bg-canvas { 
            position: fixed; inset: 0; z-index: -2; pointer-events: none; 
            background-color: var(--zc-bg-main);
        }

        /* 顶部语言切换按钮 */
        .lang-switch-container {
            position: absolute; top: 20px; right: 20px; z-index: 100;
        }
        #lang-btn {
            background: rgba(13, 12, 17, 0.6); border: 1px solid var(--zc-gold-dark);
            color: var(--zc-gold-light); padding: 4px 12px; border-radius: 4px;
            font-size: 0.85rem; cursor: pointer; transition: all 0.3s;
            backdrop-filter: blur(4px); letter-spacing: 1px;
        }
        #lang-btn:hover { background: var(--zc-gold-dark); color: var(--zc-bg-main); }

        /* 标题与版式 */
        .page-header { text-align: center; padding: 4rem 0 2rem; position: relative; z-index: 10; }
        .page-title { color: var(--zc-gold-light); font-size: 2.5rem; font-family: "STZhongsong", serif; letter-spacing: 6px; margin: 0 0 10px 0; text-shadow: 0 0 15px rgba(212, 168, 67, 0.4); }
        .page-subtitle { color: var(--zc-gold-dark); font-size: 0.9rem; letter-spacing: 4px; }

        /* 面板容器 */
        .zencode-panel {
            max-width: 720px; margin: 0 auto 3rem; 
            background-color: rgba(13, 12, 17, 0.55);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); 
            border: 1px solid rgba(138, 115, 66, 0.4); padding: 2.5rem; position: relative;
            transition: max-width 0.4s ease; box-shadow: 0 10px 50px rgba(0,0,0,0.8);
        }
        .zencode-panel::before, .zencode-panel::after { content: ''; position: absolute; width: 15px; height: 15px; border: 1px solid var(--zc-gold-dark); }
        .zencode-panel::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
        .zencode-panel::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }

        .divination-info {
            border-bottom: 1px dashed rgba(138, 115, 66, 0.6); padding-bottom: 1.5rem; margin-bottom: 2rem;
            font-family: "Courier New", Courier, monospace; line-height: 2; color: var(--zc-text-main); font-size: 1.05rem;
        }
        .info-highlight { color: var(--zc-gold-light); }
        
        /* 神煞专用布局：PC端横排，手机端自动竖排 */
        .shensha-row { display: flex; flex-direction: row; margin-bottom: 6px; line-height: 1.6; }
        .shensha-label { font-weight: bold; flex-shrink: 0; margin-right: 8px; }

        .zc-btn {
            background: rgba(13, 12, 17, 0.1); border: 1px solid var(--zc-gold-dark); color: var(--zc-gold-light);
            padding: 12px 30px; cursor: pointer; transition: all 0.3s; font-family: inherit; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
            font-size: 1.1rem; border-radius: 2px; width: 280px; letter-spacing: 2px;
        }
        .zc-btn:hover { background: var(--zc-gold-dark); color: var(--zc-bg-main); box-shadow: 0 0 15px rgba(212, 168, 67, 0.6); }
        .zc-btn:disabled { opacity: 0.5; cursor: not-allowed; border-color: var(--zc-border); color: var(--zc-text-muted); background: transparent; box-shadow: none;}
        .zc-btn-text { background: none; border: none; color: var(--zc-text-muted); cursor: pointer; font-size: 0.9rem; transition: 0.3s; }
        .zc-btn-text:hover { color: var(--zc-gold-light); text-shadow: 0 0 8px rgba(212, 168, 67, 0.8); }

        /* --- 问事输入框 --- */
        .question-input-wrapper {
            margin-bottom: 2rem;
            text-align: center;
        }
        .zc-input {
            width: 100%;
            max-width: 280px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(138, 115, 66, 0.3);
            color: var(--zc-gold-light);
            padding: 12px 15px;
            border-radius: 2px;
            font-family: inherit;
            font-size: 0.95rem;
            text-align: center;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        .zc-input::placeholder {
            color: var(--zc-text-muted);
            opacity: 0.5;
            letter-spacing: 1px;
        }
        .zc-input:focus {
            outline: none;
            border-color: var(--zc-gold-dark);
            background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 0 10px rgba(138, 115, 66, 0.2);
        }

        /* --- 六十四卦大全 侧边悬浮入口 --- */
        .gua-dict-btn {
            position: fixed;
            right: 25px;
            bottom: 40px;
            width: 42px;
            padding: 20px 0;
            background: rgba(13, 12, 17, 0.6);
            border: 1px solid var(--zc-gold-dark);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--zc-gold-light);
            text-decoration: none;
            writing-mode: vertical-rl;
            letter-spacing: 6px;
            font-family: "STZhongsong", serif;
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.4s ease;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 99;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }
        .gua-dict-btn:hover {
            background: var(--zc-gold-dark);
            color: var(--zc-bg-main);
            box-shadow: 0 0 15px rgba(212, 168, 67, 0.4);
            transform: translateY(-5px);
        }

        /* 3D 铜钱 */
        .coins-container { display: flex; justify-content: center; gap: 25px; margin: 40px 0 30px; perspective: 1000px; -webkit-perspective: 1000px; }
        .coin { width: 60px; height: 60px; position: relative; transform-style: preserve-3d; -webkit-transform-style: preserve-3d; }
        .coin-face {
            position: absolute; width: 100%; height: 100%; border-radius: 50%;
            backface-visibility: hidden; -webkit-backface-visibility: hidden;
            background: radial-gradient(circle at 30% 30%, #f5d796 0%, #d4a843 40%, #8a7342 100%);
            border: 2px solid #5a4b2a; box-sizing: border-box; display: flex; align-items: center; justify-content: center;
            color: #3b2f15; font-family: "STZhongsong", serif; font-weight: bold;
        }
        .coin-back { transform: rotateY(180deg); -webkit-transform: rotateY(180deg); }
        .coin-hole { width: 16px; height: 16px; background: rgba(13, 12, 17, 0.9); border: 2px solid #5a4b2a; position: absolute; z-index: 2; }
        .char-top { position: absolute; top: 3px; left: 50%; transform: translateX(-50%); -webkit-transform: translateX(-50%); font-size: 12px;}
        .char-bottom { position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%); -webkit-transform: translateX(-50%); font-size: 12px;}
        .char-left { position: absolute; left: 3px; top: 50%; transform: translateY(-50%); -webkit-transform: translateY(-50%); font-size: 12px;}
        .char-right { position: absolute; right: 3px; top: 50%; transform: translateY(-50%); -webkit-transform: translateY(-50%); font-size: 12px;}
        .pattern-wave { font-size: 18px; font-weight: normal; opacity: 0.6; }

        @keyframes flip-heads { 0% { transform: translateY(0) rotateX(0) rotateY(0); } 40% { transform: translateY(-100px) rotateX(360deg) rotateY(720deg); } 100% { transform: translateY(0) rotateX(0) rotateY(1440deg); } }
        @keyframes flip-tails { 0% { transform: translateY(0) rotateX(0) rotateY(0); } 40% { transform: translateY(-100px) rotateX(360deg) rotateY(900deg); } 100% { transform: translateY(0) rotateX(0) rotateY(1620deg); } }
        @keyframes fadeInYao { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @-webkit-keyframes flip-heads { 0% { -webkit-transform: translateY(0) rotateX(0) rotateY(0); } 40% { -webkit-transform: translateY(-100px) rotateX(360deg) rotateY(720deg); } 100% { -webkit-transform: translateY(0) rotateX(0) rotateY(1440deg); } }
        @-webkit-keyframes flip-tails { 0% { -webkit-transform: translateY(0) rotateX(0) rotateY(0); } 40% { -webkit-transform: translateY(-100px) rotateX(360deg) rotateY(900deg); } 100% { -webkit-transform: translateY(0) rotateX(0) rotateY(1620deg); } }
        @-webkit-keyframes fadeInYao { from { opacity: 0; -webkit-transform: translateY(10px); } to { opacity: 1; -webkit-transform: translateY(0); } }

        /* 手工排盘 */
        .manual-row-interactive {
            display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(138, 115, 66, 0.3); padding: 14px 24px;
            margin-bottom: 8px; background: rgba(0,0,0,0.5); border-radius: 2px; max-width: 400px; margin-left: auto; margin-right: auto;
        }
        .yao-interactive { width: 100px; height: 14px; cursor: pointer; display: flex; justify-content: space-between; transition: all 0.2s ease; }
        .yao-interactive:hover { filter: brightness(1.2); transform: scale(1.05); }
        .yao-dashed .line { width: 100%; height: 100%; border: 1px dashed rgba(212, 168, 67, 0.4); background: transparent; }

        .btn-dong {
            width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--zc-border); background: rgba(0,0,0,0.6); color: var(--zc-text-muted); 
            font-size: 0.85rem; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; user-select: none;
        }
        .btn-dong.active { background: var(--zc-gold-dark); color: #050505; border-color: var(--zc-gold-light); box-shadow: 0 0 12px rgba(212, 168, 67, 0.4); font-weight: bold; }

        /* 排版网格 */
        .gua-grid {
            display: grid; grid-template-columns: 45px auto auto; gap: 40px; justify-content: center;
            font-family: "Courier New", Courier, monospace; font-size: 1.05rem; transition: all 0.4s ease;
        }
        .is-jing-gua { grid-template-columns: 45px auto !important; }
        
        .gua-label { color: var(--zc-text-muted); font-size: 0.85rem; text-align: center; letter-spacing: 2px; margin-bottom: 6px; opacity: 0.8;}
        .gua-title { color: var(--zc-gold-light); text-align: center; margin-bottom: 15px; font-weight: bold; letter-spacing: 1px; text-shadow: 0 0 8px rgba(212, 168, 67, 0.3); }
        
        .beast-column { padding-top: 55px; color: var(--zc-gold-dark); opacity: 0.8; font-size: 0.95rem; font-weight: bold; }
        .beast-column span { display: flex; align-items: center; justify-content: flex-end; height: 36px; margin-bottom: 8px; padding-right: 8px; }

        .yao-row { display: flex; align-items: center; justify-content: center; height: 36px; margin-bottom: 8px; gap: 12px; }
        
        .yao-shishen { color: var(--zc-text-muted); width: 40px; flex-shrink: 0; text-align: right; }
        .yao-text { color: var(--zc-text-main); width: 85px; white-space: nowrap; flex-shrink: 0; text-align: left; padding-left: 5px;}
        .yao-symbol { width: 65px; height: 10px; display: flex; justify-content: space-between; flex-shrink: 0; filter: drop-shadow(0 0 4px rgba(212, 168, 67, 0.2));}
        .changing-mark { color: var(--zc-gold-dark); width: 25px; text-align: center; font-weight: bold; flex-shrink: 0; }
        .yao-position { color: var(--zc-gold-dark); width: 20px; text-align: center; flex-shrink: 0; }

        .yao-yang .line { width: 100%; height: 100%; background-color: var(--zc-gold-light); box-shadow: 0 0 5px rgba(212, 168, 67, 0.3);}
        .yao-yin .line { width: 42%; height: 100%; background-color: var(--zc-text-main); }
        
        .change-row { justify-content: center; gap: 12px; }
        .change-info { display: flex; gap: 12px; align-items: center; }
        
        .is-active-line .yao-shishen { color: var(--zc-gold-dark); font-weight: bold; opacity: 1; text-shadow: 0 0 8px rgba(138, 115, 66, 0.4); }
        .is-active-line .yao-text { color: var(--zc-gold-light); font-weight: bold; opacity: 1; text-shadow: 0 0 8px rgba(212, 168, 67, 0.4); }
        .is-static-line .yao-shishen { opacity: 0.35; }
        .is-static-line .yao-text { opacity: 0.35; }

        /* 手机端适配 */
        @media (max-width: 768px) {
            .zencode-panel { padding: 1.2rem 0.6rem; margin: 0 10px 2rem; }
            .page-header { padding: 3rem 0 1rem; }
            .page-title { font-size: 1.8rem; }
            .divination-info { font-size: 0.85rem; line-height: 1.6; }
            
            .shensha-row { flex-direction: column; margin-bottom: 8px; }
            
            .gua-grid { grid-template-columns: 22px auto auto; gap: 4px; }
            .is-jing-gua { grid-template-columns: 22px auto !important; }
            
            .beast-column { font-size: 0.75rem; padding-top: 48px; }
            .beast-column span { height: 30px; margin-bottom: 8px; justify-content: center; padding-right: 0;}
            
            .gua-label { font-size: 0.75rem; margin-bottom: 4px;}
            .gua-title { font-size: 0.85rem; margin-bottom: 10px; letter-spacing: 0; }
            
            .yao-row { height: 30px; gap: 3px; justify-content: flex-start;}
            .yao-shishen { width: 22px; font-size: 0.7rem; text-align: right; }
            .yao-text { width: 52px; font-size: 0.7rem; letter-spacing: -0.5px; padding-left: 2px;}
            .yao-symbol { width: 36px; height: 8px; }
            .changing-mark { width: 14px; font-size: 0.6rem; }
            .yao-position { width: 14px; font-size: 0.65rem; }
            
            .change-row { gap: 3px; justify-content: flex-start; }
            .change-info { gap: 3px; }
            
            .manual-row-interactive { padding: 10px 12px; }
            .yao-interactive { width: 60px; }

            .zc-input { max-width: 240px; font-size: 0.85rem; padding: 10px 12px; }
            .gua-dict-btn { right: 10px; bottom: 20px; width: 34px; padding: 15px 0; font-size: 0.9rem; letter-spacing: 4px; }
        }

        /* 彩蛋提示样式 */
        .easter-egg-msg {
            color: var(--zc-gold-light);
            font-size: 0.85rem;
            line-height: 1.5;
            margin-top: 15px;
            padding: 10px;
            background: rgba(138, 115, 66, 0.1);
            border: 1px solid rgba(138, 115, 66, 0.3);
            border-radius: 4px;
            font-family: "Courier New", monospace;
            opacity: 0;
            transition: opacity 0.5s;
            display: none;
        }
        .easter-egg-msg.show {
            display: block;
            opacity: 1;
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="page-header">
        <h1 class="page-title" data-t="六爻排盘">六爻排盘</h1>
        <div class="page-subtitle" data-t="· ZENCODE · 命运档案 ·">· ZENCODE · 命运档案 ·</div>
    </div>

    <div class="zencode-panel" id="main-panel">
        <div class="divination-info" id="dynamic-info" data-t="加载中...">加载中...</div>

        <div id="screen-choice" class="flow-screen">
            <h2 style="text-align: center; color: var(--zc-gold-light); margin-bottom: 1.5rem; font-weight: normal; font-size: 1.4rem;" data-t="选择推演方式">选择推演方式</h2>
            
            <div class="question-input-wrapper">
                <input type="text" id="divination-question" class="zc-input" placeholder="输入想询问的问题（选填）" data-t="输入想询问的问题（选填）">
            </div>

            <div style="display: flex; flex-direction: column; align-items: center; gap: 1.2rem;">
                <button class="zc-btn" onclick="startMethod('time')" data-t="时间起卦 (自动推演)">时间起卦 (自动推演)</button>
                <button class="zc-btn" onclick="startMethod('shake')" data-t="铜钱摇卦 (互动求测)">铜钱摇卦 (互动求测)</button>
                <button class="zc-btn" onclick="startMethod('manual')" data-t="手工排盘 (点击阴阳)">手工排盘 (点击阴阳)</button>
                <button class="zc-btn" onclick="startMethod('binary')" data-t="极客起卦 (二进制算)">极客起卦 (二进制算)</button>
            </div>
        </div>

        <div id="screen-interact" class="flow-screen" style="display: none; text-align: center;">
            <h3 id="interact-title" style="color: var(--zc-gold-light); margin-bottom: 0.5rem; font-weight: normal;"></h3>
            
            <div id="interact-shake" style="display: none;">
                <div class="coins-container">
                    <div class="coin" id="coin1">
                        <div class="coin-face coin-front"><div class="coin-hole"></div><div class="char-left pattern-wave">≈</div><div class="char-right pattern-wave">≈</div></div>
                        <div class="coin-face coin-back"><div class="coin-hole"></div><div class="char-top" data-t="乾">乾</div><div class="char-bottom" data-t="隆">隆</div><div class="char-right" data-t="通">通</div><div class="char-left" data-t="宝">宝</div></div>
                    </div>
                    <div class="coin" id="coin2">
                        <div class="coin-face coin-front"><div class="coin-hole"></div><div class="char-left pattern-wave">≈</div><div class="char-right pattern-wave">≈</div></div>
                        <div class="coin-face coin-back"><div class="coin-hole"></div><div class="char-top" data-t="乾">乾</div><div class="char-bottom" data-t="隆">隆</div><div class="char-right" data-t="通">通</div><div class="char-left" data-t="宝">宝</div></div>
                    </div>
                    <div class="coin" id="coin3">
                        <div class="coin-face coin-front"><div class="coin-hole"></div><div class="char-left pattern-wave">≈</div><div class="char-right pattern-wave">≈</div></div>
                        <div class="coin-face coin-back"><div class="coin-hole"></div><div class="char-top" data-t="乾">乾</div><div class="char-bottom" data-t="隆">隆</div><div class="char-right" data-t="通">通</div><div class="char-left" data-t="宝">宝</div></div>
                    </div>
                </div>
                <button class="zc-btn" id="btn-shake" data-t="掷出铜钱 (第1次)">掷出铜钱 (第1次)</button>
                <div id="shake-progress" style="display: flex; flex-direction: column-reverse; align-items: center; gap: 20px; margin-top: 30px;"></div>
            </div>

            <div id="interact-manual" style="display: none;">
                <div id="manual-rows" style="margin-top: 2rem;"></div>
                <button class="zc-btn" onclick="generateManualGua()" style="margin-top: 2rem; background: var(--zc-gold-dark); color: #050505; font-weight: bold;" data-t="生成卦象">生成卦象</button>
            </div>

            <div id="interact-binary" style="display: none;">
                <div style="margin: 2.5rem auto; max-width: 340px; text-align: left; background: rgba(0,0,0,0.4); padding: 24px; border: 1px solid rgba(138, 115, 66, 0.2); border-radius: 4px;">
                    <div style="color: var(--zc-text-muted); font-size: 0.85rem; margin-bottom: 20px; line-height: 1.8;" data-t="二进制输入说明">
                        <span style="color: var(--zc-gold-light);" data-t="【 编译规则 】">【 编译规则 】</span><br>
                        <span style="color: var(--zc-gold-light); font-family: monospace;">0</span> = <span data-t="阴 / 静">阴 / 静</span> <span style="opacity:0.3;margin:0 8px;">|</span> <span style="color: var(--zc-gold-light); font-family: monospace;">1</span> = <span data-t="阳 / 动">阳 / 动</span>
                    </div>
                    
                    <div style="margin-bottom: 18px;">
                        <div style="font-size: 0.8rem; color: var(--zc-gold-dark); margin-bottom: 8px; letter-spacing: 2px;" data-t="[ 数据段 ] 本卦阴阳 (必填)">[ 数据段 ] 本卦阴阳 (必填)</div>
                        <input type="text" id="input-binary-base" class="zc-input" maxlength="6" placeholder="例: 111111" autocomplete="off" style="width: 100%; font-size: 1.5rem; letter-spacing: 12px; font-family: 'Courier New', Courier, monospace; text-align: center; padding-left: 16px;" oninput="this.value=this.value.replace(/[^01]/g,''); checkEasterEgg(this.value);">
                    </div>

                    <div>
                        <div style="font-size: 0.8rem; color: var(--zc-text-muted); margin-bottom: 8px; letter-spacing: 2px;" data-t="[ 控制段 ] 动爻掩码 (选填)">[ 控制段 ] 动爻掩码 (选填)</div>
                        <input type="text" id="input-binary-mask" class="zc-input" maxlength="6" placeholder="例: 000000" autocomplete="off" style="width: 100%; font-size: 1.5rem; letter-spacing: 12px; font-family: 'Courier New', Courier, monospace; text-align: center; padding-left: 16px; border-color: rgba(138, 115, 66, 0.15);" oninput="this.value=this.value.replace(/[^01]/g,'')">
                    </div>

                    <div id="binary-error" style="color: #c8402a; font-size: 0.85rem; margin-top: 15px; text-align: center; min-height: 1rem; transition: opacity 0.3s;"></div>
                    
                    <!-- 彩蛋提示区域 -->
                    <div id="binary-easter-egg" class="easter-egg-msg"></div>
                </div>
                <button class="zc-btn" onclick="generateBinaryGua()" style="background: var(--zc-gold-dark); color: #050505; font-weight: bold; margin-top: 0.5rem;" data-t="编译卦象">编译卦象</button>
            </div>
            
            <div style="margin-top: 2.5rem;"><button class="zc-btn-text" onclick="resetFlow()" data-t="← 返回重选方式">← 返回重选方式</button></div>
        </div>

        <div id="screen-result" class="flow-screen" style="display: none;">
            <div id="result-question-box" style="text-align: center; margin-bottom: 2rem; display: none;">

    <script>
        // --- 1. 背景动画 ---
        (function(){
            const c = document.getElementById('bg-canvas');
            const ctx = c.getContext('2d');
            let W, H;
            const particles = [];
            const NUM_PARTICLES = 600;

            function resize() { W = c.width = window.innerWidth; H = c.height = window.innerHeight; }
            window.addEventListener('resize', resize); resize();

            function gaussianRandom() {
                let u = 0, v = 0;
                while(u === 0) u = Math.random();
                while(v === 0) v = Math.random();
                return Math.sqrt( -2.0 * Math.log( u ) ) * Math.cos( 2.0 * Math.PI * v );
            }

            class Particle {
                constructor() { this.isYang = Math.random() > 0.5; this.reset(true); }
                reset(randomize = false) {
                    this.progress = randomize ? Math.random() : 0; 
                    this.speed = Math.random() * 0.0015 + 0.0005; 
                    this.size = Math.random() * 3.5 + 1.5; 
                    let spread = (Math.max(W, H) * 0.15); 
                    this.thickness = gaussianRandom() * spread;
                }
                update() {
                    this.progress += this.speed;
                    if (this.progress > 1) this.reset();
                }
                draw() {
                    let cx = W / 2, cy = H / 2;
                    let maxR = Math.max(W, H) * 0.7; 
                    let baseAngle = this.progress * Math.PI * 2.5; 
                    if (!this.isYang) baseAngle += Math.PI; 
                    let r = maxR * (1 - this.progress * 0.6); 
                    let perpAngle = baseAngle + Math.PI / 2;
                    let globalRot = Date.now() * 0.00015; 
                    let finalAngle = baseAngle + globalRot;
                    let x = cx + r * Math.cos(finalAngle) + Math.cos(perpAngle + globalRot) * this.thickness;
                    let y = cy + r * Math.sin(finalAngle) + Math.sin(perpAngle + globalRot) * this.thickness;
                    let alpha = 1;
                    if (this.progress < 0.1) alpha = this.progress / 0.1;
                    if (this.progress > 0.9) alpha = (1 - this.progress) / 0.1;
                    
                    ctx.beginPath(); 
                    ctx.arc(x, y, this.size, 0, Math.PI * 2);
                    if (this.isYang) {
                        ctx.fillStyle = `rgba(245, 215, 150, ${alpha * 0.75})`;
                    } else {
                        ctx.fillStyle = `rgba(160, 125, 65, ${alpha * 0.45})`;
                    }
                    ctx.fill();
                }
            }
            
            for(let i = 0; i < NUM_PARTICLES; i++) particles.push(new Particle());
            
            function loop() {
                ctx.fillStyle = 'rgba(5, 5, 5, 0.25)'; 
                ctx.fillRect(0, 0, W, H);
                let glow = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)/2);
                glow.addColorStop(0, 'rgba(138, 115, 66, 0.06)'); 
                glow.addColorStop(1, 'transparent');
                ctx.fillStyle = glow; 
                ctx.fillRect(0, 0, W, H);
                particles.forEach(p => { p.update(); p.draw(); }); 
                requestAnimationFrame(loop);
            }
            loop();
        })();

        let isTrad = false;
        function t(str) {
            if (!str) return str;
            if (!isTrad) return str;
            return str.split('').map(c => s2t_map[c] || c).join('');
        }

        function checkLangState() {
            let lang = document.documentElement.lang || localStorage.getItem('lang') || localStorage.getItem('language') || 'zh-cn';

        function updateLiuyaoLang() {

        document.addEventListener('DOMContentLoaded', () => {
            isTrad = checkLangState();
            document.querySelectorAll('[data-t]').forEach(el => el.innerText = t(el.getAttribute('data-t')));
            initDateTime();

            observer.observe(document.documentElement, { attributes: true, attributeFilter: ['lang', 'class'] });

        // ================= 数据初始化 =================
        let currentYaos = [];

        let currentMonthZhiIdx = 0; 
        let manualYaos = [];     

        // ================= 神煞计算算法 =================
        const DZ_ARR = ["子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"];
        function getShensha(tgIdx, dzIdx) {
            let tg_ss = [];
            let dz_ss = [];

            if ([8,0,4].includes(dzIdx)) dz_ss.push(t("桃花")+"-酉");
            else if ([11,3,7].includes(dzIdx)) dz_ss.push(t("桃花")+"-子");
            else if ([2,6,10].includes(dzIdx)) dz_ss.push(t("桃花")+"-卯");
            else if ([5,9,1].includes(dzIdx)) dz_ss.push(t("桃花")+"-午");

            if ([8,0,4].includes(dzIdx)) dz_ss.push(t("将星")+"-子");
            else if ([11,3,7].includes(dzIdx)) dz_ss.push(t("将星")+"-卯");

            else if ([11,3,7].includes(dzIdx)) dz_ss.push(t("华盖")+"-未");
            else if ([2,6,10].includes(dzIdx)) dz_ss.push(t("华盖")+"-戌");
            else if ([5,9,1].includes(dzIdx)) dz_ss.push(t("华盖")+"-丑");

            `;

        // ================= 五行旺相休囚死算法 =================
        function getWangXiang(monthZhiIdx, yaoWx) {
            let monthWx = "土";
            if ([0, 11].includes(monthZhiIdx)) monthWx = "水"; 
            if ([2, 3].includes(monthZhiIdx)) monthWx = "木";  
            if ([5, 6].includes(monthZhiIdx)) monthWx = "火";  
            if ([8, 9].includes(monthZhiIdx)) monthWx = "金";  

            const gen = {"木":"火", "火":"土", "土":"金", "金":"水", "水":"木"};
            const res = {"木":"土", "土":"水", "水":"火", "火":"金", "金":"木"};

            if (yaoWx === monthWx) return t("旺");         
            if (gen[monthWx] === yaoWx) return t("相");    
            if (gen[yaoWx] === monthWx) return t("休");    
            if (res[yaoWx] === monthWx) return t("囚");    
            if (res[monthWx] === yaoWx) return t("死");    
            return "";
        }

            const errorDiv = document.getElementById('binary-error');

            if (baseInput.length !== 6) {
                errorDiv.innerText = t("Error: [数据段] 必须输入确切的 6 位二进制数");
                return;
            }
            if (maskInput.length > 0 && maskInput.length !== 6) {
                errorDiv.innerText = t("Error: [控制段] 若填写，必须是确切的 6 位二进制数");
                return;
            }
            
            errorDiv.innerText = "";
            currentYaos = [];
            
            const base = baseInput;
            const mask = maskInput.length === 6 ? maskInput : '000000';

            for (let i = 0; i < 6; i++) {
                const isYang = base.charAt(i) === '1';
                const isMoving = mask.charAt(i) === '1';

                let yaoValue;
                if (isYang && !isMoving) yaoValue = 7;      
                else if (isYang && isMoving) yaoValue = 9;  
                else if (!isYang && !isMoving) yaoValue = 8;
                else if (!isYang && isMoving) yaoValue = 6; 

                currentYaos.push(yaoValue);
            }
            renderFinalResult();
        }

        window.toggleManualYao = function(idx) {
            let y = manualYaos[idx];
            if (!y.set) { y.set = true; y.isYang = true; } 
            else if (y.isYang) { y.isYang = false; } 
            else { y.isYang = true; }
            renderManualRows();
        }

        window.toggleManualDong = function(idx) {
            let y = manualYaos[idx];
            if (!y.set) { y.set = true; y.isYang = true; }
            y.isChanging = !y.isChanging;
            renderManualRows();
        }

        function renderManualRows() {
            const container = document.getElementById('manual-rows');
            container.innerHTML = '';
            const names = [t('初爻'), t('二爻'), t('三爻'), t('四爻'), t('五爻'), t('上爻')];
            
            for(let i=5; i>=0; i--) {
                let y = manualYaos[i];
                let yaoHtml = !y.set ? `<div class="yao-interactive yao-dashed" onclick="toggleManualYao(${i})"><div class="line"></div></div>`
                                     : (y.isYang ? `<div class="yao-interactive yao-yang" onclick="toggleManualYao(${i})"><div class="line"></div></div>`
                                                 : `<div class="yao-interactive yao-yin" onclick="toggleManualYao(${i})"><div class="line"></div><div class="line"></div></div>`);
                let dongClass = y.isChanging ? 'btn-dong active' : 'btn-dong';
                container.innerHTML += `
                    <div class="manual-row-interactive">
                        <span style="color: var(--zc-gold-light); width: 60px; font-weight: bold; letter-spacing:2px;">${names[i]}</span>
                        ${yaoHtml}
                        <div class="${dongClass}" onclick="toggleManualDong(${i})">${t("动")}</div>
                    </div>`;
            }
        }

        window.generateManualGua = function() {
            currentYaos = [];
            for(let i=0; i<6; i++) {
                let y = manualYaos[i];
                if (!y.set) { alert(t("请先点按排定所有六个爻的阴阳！")); return; }
                currentYaos.push(y.isYang ? (y.isChanging ? 9 : 7) : (y.isChanging ? 6 : 8));
            }
            renderFinalResult();
        }

        // ================= 八宫纳甲核心算法 =================
        const DZ = ["子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"];
        const DZ_WX = ["水","土","木","木","土","火","火","土","金","金","土","水"];
        const WX_IDX = {"木":0, "火":1, "土":2, "金":3, "水":4};
        const KINSHIPS = ["兄弟", "子孙", "妻财", "官鬼", "父母"];
        const BEASTS = ["青龙", "朱雀", "勾陈", "滕蛇", "白虎", "玄武"];

        const PALACE_NAME = {0:"坤", 1:"震", 2:"坎", 3:"兑", 4:"艮", 5:"离", 6:"巽", 7:"乾"};
        const PALACE_WX = {0:"土", 1:"木", 2:"水", 3:"金", 4:"土", 5:"火", 6:"木", 7:"金"};

        const HEX_NAMES = [
          ["坤为地", "地雷复", "地水师", "地泽临", "地山谦", "地火明夷", "地风升", "地天泰"],
          ["雷地豫", "震为雷", "雷水解", "雷泽归妹", "雷山小过", "雷火丰", "雷风恒", "雷天大壮"],
          ["水地比", "水雷屯", "坎为水", "水泽节", "水山蹇", "水火既济", "水风井", "水天需"],
          ["泽地萃", "泽雷随", "泽水困", "兑为泽", "泽山咸", "泽火革", "泽风大过", "泽天夬"],
          ["山地剥", "山雷颐", "山水蒙", "山泽损", "艮为山", "山火贲", "山风蛊", "山天大畜"],
          ["火地晋", "火雷噬嗑", "火水未济", "火泽睽", "火山旅", "离为火", "火风鼎", "火天大有"],
          ["风地观", "风雷益", "风水涣", "风泽中孚", "风山渐", "风火家人", "巽为风", "风天小畜"],
          ["天地否", "天雷无妄", "天水讼", "天泽履", "天山遁", "天火同人", "天风姤", "乾为天"]
        ];

        const NA_JIA_DZ = {
          0: [[7,5,3], [1,11,9]], 1: [[0,2,4], [6,8,10]], 2: [[2,4,6], [8,10,0]], 3: [[5,3,1], [11,9,7]],
          4: [[4,6,8], [10,0,2]], 5: [[3,1,11], [9,7,5]], 6: [[1,11,9], [7,5,3]], 7: [[0,2,4], [6,8,10]]
        };
        const NA_JIA_TG = { 0:["乙","癸"], 1:["庚","庚"], 2:["戊","戊"], 3:["丁","丁"], 4:["丙","丙"], 5:["己","己"], 6:["辛","辛"], 7:["甲","壬"] };

        function getGuaTags(b, t_val, name) {
            let tags = [];
            let x = b ^ t_val;
            if (x === 5) tags.push(t("游魂"));
            if (x === 2) tags.push(t("归魂"));
            if (x === 0 || name === "天雷无妄" || name === "雷天大壮") tags.push(t("六冲"));
            const liuHe = ["天地否", "地天泰", "水泽节", "泽水困", "火山旅", "山火贲", "雷地豫", "地雷复"];
            if (liuHe.includes(name)) tags.push(t("六合"));
            
            return tags.length > 0 ? `<span style="font-size:0.75rem; color:var(--zc-gold-dark); font-weight:normal; margin-left:8px; opacity:0.8;">[${tags.join("·")}]</span>` : "";
        }

        function getPalaceAndShi(b, t_val) {
            let x = b ^ t_val;
            if (x === 0) return { p: b, shi: 5 };
            if (x === 1) return { p: t_val, shi: 0 };
            if (x === 3) return { p: t_val, shi: 1 };
            if (x === 7) return { p: t_val, shi: 2 };
            if (x === 6) return { p: t_val ^ 1, shi: 3 };
            if (x === 4) return { p: t_val ^ 3, shi: 4 };
            if (x === 5) return { p: t_val ^ 2, shi: 3 }; 
            if (x === 2) return { p: b, shi: 2 };      
            return { p: 7, shi: 0 };
        }

        function getKinship(palaceWx, lineWx) { return t(KINSHIPS[(WX_IDX[lineWx] - WX_IDX[palaceWx] + 5) % 5]); }

        window.calcGua = function(yaos) {
            let mY = [], cY = [];
            for (let i=0; i<6; i++) {
                mY.push((yaos[i]===7||yaos[i]===9)?1:0);
                cY.push((yaos[i]===6)?1:(yaos[i]===9?0:mY[i]));
            }
            let bM = mY[0] | (mY[1]<<1) | (mY[2]<<2), tM = mY[3] | (mY[4]<<1) | (mY[5]<<2);
            let bC = cY[0] | (cY[1]<<1) | (cY[2]<<2), tC = cY[3] | (cY[4]<<1) | (cY[5]<<2);
            
            let infoM = getPalaceAndShi(bM, tM);
            let infoC = getPalaceAndShi(bC, tC); 
            let pWx = PALACE_WX[infoM.p]; 

            function buildLines(b, t_val) {
                let lines = [];
                for(let i=0; i<3; i++) {
                    let dzIdx = NA_JIA_DZ[b][0][i]; let wxStr = DZ_WX[dzIdx];
                    lines.push({tg:t(NA_JIA_TG[b][0]), dz:t(DZ[dzIdx]), wx:t(wxStr), k:getKinship(pWx, wxStr), state: getWangXiang(currentMonthZhiIdx, wxStr)});
                }
                for(let i=0; i<3; i++) {
                    let dzIdx = NA_JIA_DZ[t_val][1][i]; let wxStr = DZ_WX[dzIdx];
                    lines.push({tg:t(NA_JIA_TG[t_val][1]), dz:t(DZ[dzIdx]), wx:t(wxStr), k:getKinship(pWx, wxStr), state: getWangXiang(currentMonthZhiIdx, wxStr)});
                }
                return lines;
            }
            
            let bIdx = (currentDayTgIdx <= 1) ? 0 : (currentDayTgIdx <= 3) ? 1 : (currentDayTgIdx === 4) ? 2 : (currentDayTgIdx === 5) ? 3 : (currentDayTgIdx <= 7) ? 4 : 5;
            let beasts = [];
            for (let i=0; i<6; i++) beasts.push(t(BEASTS[(bIdx + i) % 6]));
            
            return {
                main: { name: t(HEX_NAMES[tM][bM]), tag: getGuaTags(bM, tM, HEX_NAMES[tM][bM]), palaceName: t(PALACE_NAME[infoM.p]), shi: infoM.shi, ying: (infoM.shi+3)%6, lines: buildLines(bM, tM) },
                change: { name: t(HEX_NAMES[tC][bC]), tag: getGuaTags(bC, tC, HEX_NAMES[tC][bC]), palaceName: t(PALACE_NAME[infoC.p]), shi: infoC.shi, ying: (infoC.shi+3)%6, lines: buildLines(bC, tC) },
                beasts: beasts
            };
        }

        // ================= 最终渲染 =================
        window.renderFinalResult = function() {
            showScreen('screen-result');
            
            const questionInput = document.getElementById('divination-question');
            const questionBox = document.getElementById('result-question-box');
            const questionText = document.getElementById('result-question-text');

            if (questionInput && questionBox && questionText) {
                const qVal = questionInput.value.trim();
                if (qVal) {
                    questionText.innerText = qVal;
                    questionBox.style.display = 'block'; 
                } else {
                    questionText.innerText = '';
                    questionBox.style.display = 'none';  
                }
            }

            const mainContainer = document.getElementById('dynamic-main-gua');
            const changeContainer = document.getElementById('dynamic-change-gua');
            const beastContainer = document.getElementById('dynamic-beasts');
            const guaLayout = document.getElementById('gua-layout');
            const changeCol = document.getElementById('change-gua-col');

            if (!mainContainer || !changeContainer || !beastContainer) return;

            mainContainer.innerHTML = ''; changeContainer.innerHTML = ''; beastContainer.innerHTML = '';

            const gua = window.calcGua(currentYaos);
            const hasChange = currentYaos.some(v => v === 6 || v === 9);

            if (!hasChange) {
                changeCol.style.display = 'none';
                guaLayout.classList.add('is-jing-gua');
            } else {
                changeCol.style.display = 'block';
                guaLayout.classList.remove('is-jing-gua');
            }

            document.getElementById('main-gua-title').innerHTML = `${gua.main.palaceName}${t("宫")}：${gua.main.name}${gua.main.tag}`;
            if (hasChange) document.getElementById('change-gua-title').innerHTML = `${gua.change.palaceName}${t("宫")}：${gua.change.name}${gua.change.tag}`;
            
            for(let i=5; i>=0; i--) beastContainer.insertAdjacentHTML('beforeend', `<span>${gua.beasts[i]}</span>`);

            for(let i=5; i>=0; i--) {
                let val = currentYaos[i];
                let isMainYang = (val === 7 || val === 9);
                let mark = val === 9 ? '○→' : (val === 6 ? '×→' : '');
                let mLine = gua.main.lines[i];
                let mPos = (i === gua.main.shi) ? t('世') : (i === gua.main.ying) ? t('应') : '';

                let stateHtml = `<span style="font-size:0.6rem; opacity:0.7; margin-left:2px; vertical-align: super;">(${mLine.state})</span>`;

                mainContainer.insertAdjacentHTML('beforeend', `
                    <div class="yao-row">
                        <span class="yao-shishen">${mLine.k}</span>
                        <span class="yao-text">${mLine.tg}${mLine.dz}${mLine.wx}${stateHtml}</span>
                        <div class="yao-symbol ${isMainYang ? 'yao-yang' : 'yao-yin'}">${isMainYang ? '<div class="line"></div>' : '<div class="line"></div><div class="line"></div>'}</div>
                        <span class="changing-mark">${mark}</span>
                        <span class="yao-position">${mPos}</span>
                    </div>`);
                
                if (hasChange) {
                    let isChangeYang = val === 9 ? false : (val === 6 ? true : isMainYang);
                    let isChangingLine = (val === 6 || val === 9);
                    let cLine = gua.change.lines[i];
                    let cPos = (i === gua.change.shi) ? t('世') : (i === gua.change.ying) ? t('应') : '';
                    
                    let stateClass = isChangingLine ? 'is-active-line' : 'is-static-line';
                    let cStateHtml = `<span style="font-size:0.6rem; opacity:0.7; margin-left:2px; vertical-align: super;">(${cLine.state})</span>`;

                    changeContainer.insertAdjacentHTML('beforeend', `
                        <div class="yao-row change-row ${stateClass}">
                            <div class="yao-symbol ${isChangeYang ? 'yao-yang' : 'yao-yin'}">${isChangeYang ? '<div class="line"></div>' : '<div class="line"></div><div class="line"></div>'}</div>
                            <div class="change-info">
                                <span class="yao-shishen">${cLine.k}</span>
                                <span class="yao-text">${cLine.tg}${cLine.dz}${cLine.wx}${cStateHtml}</span>
                                <span class="yao-position">${cPos}</span>
                            </div>
                        </div>`);
                }
            }
        }

        // ================= 导出图片功能 =================
        window.exportGuaImage = function() {
            if (typeof html2canvas === 'undefined') {
                alert(t("截图引擎未加载完成，请稍后重试或检查网络。"));
                return;
            }

            const btn = document.getElementById('btn-export-img');
            const originalText = btn.innerText;
            btn.innerText = t("正在生成高清图...");
            btn.disabled = true;

            const panel = document.getElementById('main-panel');
            const actionArea = document.getElementById('result-action-area');
            
            const originalBg = panel.style.background || '';
            const originalFilter = panel.style.backdropFilter || '';
            const originalShadow = panel.style.boxShadow || '';

            if (actionArea) actionArea.style.display = 'none';
            panel.style.background = '#0d0c11'; 
            panel.style.backdropFilter = 'none';
            panel.style.boxShadow = 'none'; 

            setTimeout(() => {
                html2canvas(panel, {
                    scale: 2, 
                    backgroundColor: '#050505', 
                    useCORS: true,
                    logging: false
                }).then(canvas => {
                    if (actionArea) actionArea.style.display = 'flex';
                    panel.style.background = originalBg;
                    panel.style.backdropFilter = originalFilter;
                    panel.style.boxShadow = originalShadow;
                    btn.innerText = originalText;
                    btn.disabled = false;

                    const link = document.createElement('a');
                    const timestamp = new Date().getTime();
                    link.download = `ZenCode_命运档案_${timestamp}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                }).catch(err => {
                    console.error("图片生成失败:", err);
                    if (actionArea) actionArea.style.display = 'flex';
                    panel.style.background = originalBg;
                    panel.style.backdropFilter = originalFilter;
                    panel.style.boxShadow = originalShadow;
                    btn.innerText = originalText;
                    btn.disabled = false;
                    alert(t("图片生成失败，请稍后重试。"));
                });
            }, 100);
        }
    </script>
</body>
</html>
