<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="zh-CN">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>控制面板 - 南江大学星火BBS</title>
    <style type="text/css">
        /* ================= 2007年 Discuz! 后台复古外壳样式 ================= */
        body { background-color: #E2E8F1; color: #333333; font-family: "SimSun", "宋体", Arial, sans-serif; font-size: 14px; margin: 0; padding: 10px 0; overflow: hidden;}
        a { color: #004499; text-decoration: none; }
        a:hover { text-decoration: underline; color: #FF6600; }
        .bold { font-weight: bold; }
        .red { color: #FF0000; }
        
        #wrap { width: 96%; min-width: 980px; margin: 0 auto; background-color: #FFFFFF; border: 1px solid #A6CBE7; padding: 15px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        .header { border-bottom: 3px solid #336699; padding-bottom: 10px; margin-bottom: 15px; font-weight: bold; font-size: 14px; display: flex; justify-content: space-between; align-items: flex-end;}
        .logo-text { font-family: "Microsoft YaHei", "黑体", sans-serif; font-size: 24px; color: #336699; }
        
        /* 顶部返回按钮 */
        .btn-close-return {
            font-weight: bold; color: #336699; font-size: 16px; 
            border: 1px solid #A6CBE7; padding: 4px 10px; background: #F0F5FA; cursor: pointer; transition: 0.2s;
        }
        .btn-close-return:hover { background: #FF0000; color: #FFF; border-color: #900; }
        .btn-close-return span { color: #FF0000; font-weight: 900; }
        .btn-close-return:hover span { color: #FFF; }

        .admin-container { display: flex; border: 1px solid #A6CBE7; background: #FFF; height: 75vh; position: relative; }
        
        /* 左侧菜单栏 (内容丰富化) */
        .sidebar { width: 200px; background: #F0F5FA; border-right: 1px solid #A6CBE7; padding: 10px 0; z-index: 2; overflow-y: auto; }
        .menu-group { margin-bottom: 15px; }
        .menu-title { background: #EBF2F8; padding: 6px 15px; font-weight: bold; color: #336699; border-top: 1px solid #FFF; border-bottom: 1px solid #D5E4F1; font-size: 13px; }
        .menu-list { list-style: none; margin: 0; padding: 0; }
        .menu-list li a { display: block; padding: 8px 15px 8px 25px; color: #333; border-bottom: 1px dashed #D5E4F1; transition: background 0.2s; }
        .menu-list li a:hover, .menu-list li a.active { background: #FFF; color: #FF6600; font-weight: bold; border-left: 3px solid #FF6600; padding-left: 22px; }
        .menu-list li a.disabled { color: #aaa; text-decoration: line-through; cursor: not-allowed; border-left: none; }
        .menu-list li a.disabled:hover { background: transparent; padding-left: 25px; }

        /* 右侧内容区 */
        .content { flex: 1; padding: 0; background: #FFF; position: relative; overflow: hidden; }
        
        /* ================= 嵌入式绿色终端 ================= */
        #embedded-terminal {
            position: absolute; inset: 0; background: #051005; color: #0f0; 
            font-family: 'Courier New', Courier, monospace; font-size: 14px; padding: 20px;
            z-index: 100; overflow: hidden; display: flex; flex-direction: column;
            box-shadow: inset 0 0 20px #000; transition: opacity 1s;
        }
        .term-line { margin-bottom: 6px; opacity: 0; text-shadow: 0 0 5px #0f0; }

        /* ================= API 密集请求群 ================= */
        #api-swarm-container {
            position: absolute; inset: 0; background: #FFF; z-index: 50;
            overflow: hidden; padding: 20px; display: none;
        }
        .content-title { font-size: 16px; font-weight: bold; border-bottom: 2px solid #A6CBE7; padding-bottom: 8px; margin-bottom: 20px; color: #336699; position: relative; z-index: 60; background: rgba(255,255,255,0.8); }
        
        #swarm-area { position: relative; width: 100%; height: calc(100% - 50px); }

        /* 单个 API 请求块 (通用外观，包括2007年节点) */
        .api-node {
            position: absolute; background: #F9FBFE; border: 1px solid #A6CBE7; 
            padding: 8px 12px; font-size: 12px; box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
            transition: all 0.3s; cursor: crosshair; display: flex; flex-direction: column; gap: 5px;
            width: 280px; min-height: 100px;
        }
        .api-node:hover { z-index: 1000 !important; border-color: #FF0000; background: #FFF0F0; transform: scale(1.05); }
        
        .node-header { font-weight: bold; color: #336699; font-family: Tahoma; font-size: 11px; border-bottom: 1px dashed #CCC; padding-bottom: 3px;}
        .node-body { color: #555; line-height: 1.4; }
        .node-action { text-align: right; margin-top: auto; }
        
        .btn-approve { background: #336699; color: #FFF; border: 1px solid #2B5E8A; padding: 4px 10px; cursor: pointer; font-size: 12px; font-family: SimSun; }
        .btn-approve:hover { background: #FF0000; border-color: #900; }

        /* 批准后的异化状态：居中、放大、高反差色 */
        .api-node.absorbed { 
            background: #2a0505 !important; /* 暗血色背景 */
            border: 1px solid #ff0000 !important; 
            box-shadow: 0 0 15px rgba(255,0,0,0.5);
            justify-content: center; align-items: center;
            pointer-events: none;
        }
        .api-node.absorbed * { display: none; } /* 隐藏原有文本和按钮 */
        .api-node.absorbed::after {
            content: "[ 已 融 合 ]";
            color: #ff3333; /* 亮红字 */
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 4px;
            text-shadow: 0 0 8px #f00;
            display: block;
        }

        /* 屏闪特效 */
        #flash-overlay {
            position: fixed; inset: 0; background: #ff0000; z-index: 100000;
            opacity: 0; pointer-events: none; transition: opacity 0.05s; mix-blend-mode: multiply;
        }

        /* 向上浮动的血字 */
        .floating-text {
            position: fixed; bottom: -50px;
            color: #ff0000; font-size: 24px; font-weight: bold;
            font-family: "Microsoft YaHei", "黑体", sans-serif;
            text-shadow: 0 0 10px #ff0000, 0 0 20px #800000;
            z-index: 99990; pointer-events: none;
            animation: floatUp 3.5s ease-in forwards;
            opacity: 0.8;
        }
        @keyframes floatUp {
            0% { bottom: -50px; opacity: 1; transform: scale(1); }
            100% { bottom: 100vh; opacity: 0; transform: scale(1.8); letter-spacing: 8px; }
        }

        /* 终端吞噬全屏特效 */
        #final-terminal {
            display: none; position: fixed; inset: 0; background: #000; z-index: 999999;
            flex-direction: column; justify-content: center; align-items: center;
            color: #f00; font-family: 'Courier New', Courier, monospace; text-align: center;
        }
    </style>
</head>
<body>

<div id="flash-overlay"></div>

<div id="wrap">
    <div class="header">
        <div class="logo-text">星火BBS 核心控制面板 (CORE_UPLINK)</div>
        <div>
            登录人：<span class="bold red">26级_既济 (admin)</span> &nbsp;|&nbsp; 
            <a href="bbs_2026_home.html" class="btn-close-return"><span>X</span> 返回主站</a>
        </div>
    </div>

    <div class="admin-container">
        <div class="sidebar">
            <div class="menu-group">
                <div class="menu-title">数据接口管理</div>
                <ul class="menu-list">
                    <li><a href="#" class="active">API 接入请求审核</a></li>
                    <li><a href="#" class="disabled">首页大盘 (Offline)</a></li>
                    <li><a href="#" class="disabled">帖子审核与回收站</a></li>
                    <li><a href="#" class="disabled">用户权限管理</a></li>
                </ul>
            </div>
            <div class="menu-group">
                <div class="menu-title">系统状态监控</div>
                <ul class="menu-list">
                    <li><a href="#" style="color:#D32F2F; font-weight:bold; animation: pulse 1s infinite;">星象引擎状态 (超载)</a></li>
                    <li><a href="#">底层异常日志 [ SYS_WARN ]</a></li>
                    <li><a href="#">防御探针日志</a></li>
                </ul>
            </div>
        </div>

        <div class="content">
            <div id="embedded-terminal"></div>

            <div id="api-swarm-container">
                <div class="content-title">API 接入请求总览 - 待审批队列 (999+)</div>
                <div id="swarm-area">
                    </div>
            </div>
        </div>
    </div>
</div>

<div id="final-terminal">
    <h1 style="font-size: 3.5rem; letter-spacing: 0.1em; text-shadow: 0 0 20px #f00; margin-bottom: 20px; font-family: 'SimSun', serif;">觀測者已成為被觀測物</h1>
    <p style="font-size: 1.5rem; opacity: 0.8; font-weight:bold;">歡迎加入永恆的星空血肉網絡。</p>
    <p style="margin-top:60px; font-size:1rem; color:#555;">[ UPLINK SECURED. ]</p>
</div>

<script type="text/javascript">
    // ==========================================
    // 逻辑 1：潜入成功，给首页种下解锁缓存
    // ==========================================
    localStorage.setItem('njdx_bbs_override', 'true');

    // ==========================================
    // 逻辑 2：获取玩家真实信息以制造恐怖感
    // ==========================================
    let userIP = "127.0.0.1";
    let userLoc = "未知坐标";
    let userLatLon = "0.0000, 0.0000";

    fetch('https://ipapi.co/json/')
        .then(response => response.json())
        .then(data => {
            userIP = data.ip || "192.168.1.104";
            userLoc = `${data.city}, ${data.country_name}`;
            userLatLon = `${data.latitude}, ${data.longitude}`;
            startBootSequence(); 
        })
        .catch(() => {
            startBootSequence(); 
        });

    // ==========================================
    // 逻辑 3：音效系统与特效 (屏闪、飘字)
    // ==========================================
    let audioCtx = null;
    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    // 血肉挤压音效
    function playSquishSound() {
        initAudio();
        const bufferSize = audioCtx.sampleRate * 0.4;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (audioCtx.sampleRate * 0.05));
        }
        const noiseSource = audioCtx.createBufferSource();
        noiseSource.buffer = buffer;
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass'; filter.frequency.setValueAtTime(600, audioCtx.currentTime);
        filter.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.3);
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(1.5, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        noiseSource.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
        noiseSource.start();
    }

    // 屏幕血红频闪
    function triggerFlash() {
        const overlay = document.getElementById('flash-overlay');
        overlay.style.opacity = '0.7';
        setTimeout(() => { overlay.style.opacity = '0'; }, 80);
    }

    // 从底部浮起红色文字
    function spawnFloatingText() {
        const textNode = document.createElement('div');
        textNode.className = 'floating-text';
        textNode.innerText = "Api已被接入";
        // 随机水平位置，防止文字完全重叠
        const randomLeft = 30 + Math.random() * 40; 
        textNode.style.left = `${randomLeft}%`;
        
        document.body.appendChild(textNode);
        
        // 动画结束后自动清理 DOM
        setTimeout(() => {
            if(textNode.parentNode) textNode.remove();
        }, 3600);
    }

    // ==========================================
    // 逻辑 4：嵌入式终端启动动画
    // ==========================================
    function startBootSequence() {
        const terminal = document.getElementById('embedded-terminal');
        const logs = [
            "BBS_CORE_KERNEL [Version 6.1.7600]",
            "(c) 2007 NanJiang University. All rights reserved.",
            " ",
            "C:\\SYS> node_connect --override",
            "[SYSTEM] Soul_Digitization... 100%",
            "[Flesh_Engine] Biological fluids injected. Node stable.",
            `[NETWORK] Incoming trace established: IP ${userIP}`,
            `[NETWORK] Physical coordinate locked: ${userLatLon} (${userLoc})`,
            " ",
            "[WARNING] Post module corrupted. Redirecting to raw API stream...",
            "Loading interface..."
        ];

        let delay = 0;
        logs.forEach((log, index) => {
            setTimeout(() => {
                const line = document.createElement('div');
                line.className = 'term-line';
                line.innerHTML = log;
                terminal.appendChild(line);
                setTimeout(() => line.style.opacity = '1', 50);
                
                terminal.scrollTop = terminal.scrollHeight;

                if (index === logs.length - 1) {
                    setTimeout(() => {
                        terminal.style.opacity = '0';
                        setTimeout(() => {
                            terminal.style.display = 'none';
                            initApiSwarm(); 
                        }, 1000);
                    }, 1200);
                }
            }, delay);
            delay += 250 + Math.random() * 250;
        });
    }

    // ==========================================
    // 逻辑 5：密密麻麻的四维 API 请求群
    // ==========================================
    let corruptionLevel = 0;

    function initApiSwarm() {
        initAudio(); 
        document.getElementById('api-swarm-container').style.display = 'block';
        const swarmArea = document.getElementById('swarm-area');
        
        const nodeCount = 45; // 大量节点填满屏幕
        let nodesArray = [];

        // 1. 生成现代请求
        for(let i = 0; i < nodeCount; i++) {
            const reqTime = new Date(Date.now() - Math.random() * 60000).toLocaleTimeString();
            nodesArray.push(`
                <div class="node-header">[+] 四维总览请求 (ID:${Math.floor(Math.random()*90000)+10000})</div>
                <div class="node-body">
                    时间: ${reqTime}<br>
                    来源 IP: <span class="bold">${userIP}</span><br>
                    坐标: ${userLatLon}<br>
                    类型: 空间全息扫描与意识同步
                </div>
                <div class="node-action">
                    <button class="btn-approve" onclick="absorbNode(this, event)">批准请求</button>
                </div>
            `);
        }

        // 2. 生成 2007 的致命未济节点 (混入其中，外观结构代码完全一致)
        const fatalNodeHtml = `
            <div class="node-header">[+] 四维总览请求 (ID:00042)</div>
            <div class="node-body">
                时间: 2007-06-11 11:00:00<br>
                来源 IP: <span class="bold">192.168.0.12</span><br>
                实体: 未济 (残存质)<br>
                类型: 空间全息扫描与意识同步
            </div>
            <div class="node-action">
                <button class="btn-approve" onclick="triggerAssimilation(this, event)">批准请求</button>
            </div>
        `;
        
        // 随机挑一个位置插入致命节点，保证它和别人的渲染方式毫无二致
        const fatalIndex = Math.floor(Math.random() * (nodeCount / 2)) + Math.floor(nodeCount / 4); // 放在中间层级
        nodesArray.splice(fatalIndex, 0, fatalNodeHtml);

        // 渲染所有节点
        nodesArray.forEach((htmlContent) => {
            const node = document.createElement('div');
            node.className = 'api-node';
            
            // 随机坐标重叠 (打散在容器内)
            node.style.left = `${Math.random() * 75}%`;
            node.style.top = `${Math.random() * 80}%`;
            node.style.zIndex = Math.floor(Math.random() * 50);
            
            node.innerHTML = htmlContent;
            swarmArea.appendChild(node);
        });
    }

    // 交互：吸收现代节点
    window.absorbNode = function(btn, e) {
        e.stopPropagation();
        triggerFlash();       // 屏闪
        playSquishSound();    // 音效
        spawnFloatingText();  // 漂浮红字
        
        const node = btn.closest('.api-node');
        node.classList.add('absorbed'); // CSS 接管异化展现 (居中放大红字)
        
        corruptionLevel++;
        
        // 背景环境微弱变异
        if (corruptionLevel === 5) {
            document.body.style.backgroundColor = "#e0caca";
        } else if (corruptionLevel === 12) {
            document.body.style.backgroundColor = "#2a1515";
            document.querySelector('.header').style.backgroundColor = "#110";
            document.querySelector('.sidebar').style.backgroundColor = "#200";
        }
    }

    // ==========================================
    // 逻辑 6：最终同化 (点击 2007 节点)
    // ==========================================
    window.triggerAssimilation = function(btn, e) {
        e.stopPropagation();
        triggerFlash();
        playSquishSound();
        spawnFloatingText();
        
        const node = btn.closest('.api-node');
        node.classList.add('absorbed');
        
        // 锁死全部交互
        const swarm = document.getElementById('api-swarm-container');
        swarm.style.pointerEvents = 'none'; 
        
        // 伪装面板瞬间崩溃变红
        document.body.style.filter = 'contrast(200%) saturate(150%) hue-rotate(-20deg) invert(10%)';
        
        let flashCount = 0;
        const flashInterval = setInterval(() => {
            document.body.style.backgroundColor = flashCount % 2 === 0 ? "#f00" : "#000";
            spawnFloatingText(); // 疯狂冒字
            playSquishSound();
            flashCount++;
            if (flashCount > 10) {
                clearInterval(flashInterval);
                document.getElementById('wrap').style.display = 'none';
                
                // 弹出最终文字
                const finalTerm = document.getElementById('final-terminal');
                finalTerm.style.display = 'flex';
                try { document.documentElement.requestFullscreen(); } catch(err){}
            }
        }, 150);
    }

</script>

</body>
</html>
