<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINAL UPLINK - SC_DEEP_NODE</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #050505; color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }
        
        /* CRT 屏幕微特效 */
        #crt-screen {
            position: relative; width: 100%; height: 100%; padding: 20px; box-sizing: border-box;
            overflow-y: auto; text-shadow: 0 0 5px rgba(0, 255, 0, 0.5);
            -webkit-overflow-scrolling: touch;
        }
        #crt-screen::before {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        .output-line { margin: 6px 0; line-height: 1.5; word-wrap: break-word; font-size: 14px; }
        .system-red { color: #ff0000; text-shadow: 0 0 10px #ff0000; font-weight: bold; }
        .system-yellow { color: #ffcc00; font-weight: bold; text-shadow: 0 0 5px rgba(255,204,0,0.5); }
        .system-white { color: #ffffff; font-weight: bold; }
        
        /* 交互输入区 */
        #input-area { display: none; margin-top: 15px; }
        .prompt { color: #0f0; margin-right: 10px; font-weight: bold; font-size: 14px; }
        #user-input { color: #fff; white-space: pre-wrap; word-wrap: break-word; font-size: 14px; font-weight: bold; background: rgba(255,255,255,0.1); padding: 2px 4px; }
        .cursor { display: inline-block; width: 8px; height: 15px; background-color: #0f0; animation: blink 1s step-end infinite; vertical-align: middle; }
        
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* 底部操作小抄，防止玩家忘记怎么唤醒键盘 */
        #mobile-tip { text-align: center; color: #555; font-size: 12px; margin-top: 25px; border-top: 1px dashed #222; padding-top: 10px; }

        /* 移动端依赖的隐形核心组件 */
        #hidden-input {
            position: fixed; top: -100px; left: -100px;
            width: 1px; height: 1px; opacity: 0;
            background: transparent; border: none; outline: none; z-index: -1;
        }

        /* 震动崩溃动画 */
        .fatal-crash { animation: screen-shake 0.1s infinite, color-invert 0.2s infinite; }
        @keyframes screen-shake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(0px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        @keyframes color-invert {
            0% { filter: invert(0%) sepia(100%) hue-rotate(0deg) saturate(1000%); }
            50% { filter: invert(100%) sepia(100%) hue-rotate(300deg) saturate(1000%); background:#f00; }
            100% { filter: invert(0%) sepia(100%) hue-rotate(0deg) saturate(1000%); }
        }
    </style>
</head>
<body>

<input type="text" id="hidden-input" autocomplete="off" autocapitalize="off" spellcheck="false">

<div id="crt-screen">
    <div id="output"></div>
    <div id="input-area">
        <span class="prompt" id="terminal-prompt">root@SC_DEEP_NODE:~#</span>
        <span id="user-input"></span><span class="cursor"></span>
        <div id="mobile-tip">💡 电脑端直接键盘输入 / 移动端请点击屏幕任意位置唤醒键盘</div>
    </div>
</div>

<script type="text/javascript">
    const outputDiv = document.getElementById('output');
    const inputArea = document.getElementById('input-area');
    const userInputSpan = document.getElementById('user-input');
    const screenDiv = document.getElementById('crt-screen');
    const hiddenInput = document.getElementById('hidden-input');
    const promptSpan = document.getElementById('terminal-prompt');

    let isAcceptingInput = false;
    let terminalState = "normal"; // normal, awaiting_code

    // 全局点击聚焦，唤醒移动端键盘
    function focusTerminal() {
        if (isAcceptingInput) {
            hiddenInput.focus();
        }
    }
    document.addEventListener('click', focusTerminal);
    document.addEventListener('touchend', focusTerminal);

    // 打字机核心动效
    async function typeLine(text, speed = 15, className = "output-line") {
        return new Promise(resolve => {
            const div = document.createElement('div');
            div.className = className;
            outputDiv.appendChild(div);
            
            if (speed === 0) {
                div.innerHTML = text;
                screenDiv.scrollTop = screenDiv.scrollHeight;
                resolve();
                return;
            }

            let i = 0;
            function typeChar() {
                if (i < text.length) {
                    if (text.substring(i, i+4) === "<br>") {
                        div.innerHTML += "<br>";
                        i += 4;
                    } else {
                        div.innerHTML += text.charAt(i);
                        i++;
                    }
                    screenDiv.scrollTop = screenDiv.scrollHeight;
                    setTimeout(typeChar, speed + Math.random() * 10);
                } else {
                    resolve();
                }
            }
            typeChar();
        });
    }

    const sleep = ms => new Promise(r => setTimeout(r, ms));

    // 开机引导序列
    async function bootSequence() {
        await sleep(500);
        await typeLine("INITIALIZING DEEP CORE UPLINK...", 25);
        await sleep(300);
        await typeLine("BYPASSING TEMPORAL FIREWALL (19 YEARS LATENCY)... [OK]", 5);
        await sleep(200);
        await typeLine("ESTABLISHING CONNECTION TO: SICHUAN DEEP EARTH MAINFRAME... [OK]", 5);
        await sleep(500);
        await typeLine("<br>WARNING: GARBAGE COLLECTION PROTOCOL PAUSED IN SECTOR [NANJIANG_UNIV].", 5, "output-line system-yellow");
        await typeLine("REASON: INSUFFICIENT DIMENSIONAL HASH RATE.", 5, "output-line system-red");
        
        // 🌟 小白保姆级第一步引导
        await typeLine("<br>================================================================", 0);
        await typeLine("[时空连接器助手提示]：", 0, "output-line system-yellow");
        await typeLine("现在需要查看服务器目录下的隐藏文件。请在光标处输入 <span class='system-white'>ls</span> 并按下键盘上的<span class='system-white'>回车键(Enter)</span>。", 0);
        await typeLine("================================================================", 0);
        
        inputArea.style.display = 'block';
        isAcceptingInput = true;
        hiddenInput.value = "";
        hiddenInput.focus();
        screenDiv.scrollTop = screenDiv.scrollHeight;
    }

    // 实时同步输入框内容到终端显示
    hiddenInput.addEventListener('input', function() {
        if (!isAcceptingInput) {
            hiddenInput.value = "";
            return;
        }
        userInputSpan.innerText = hiddenInput.value;
    });

    // 捕获回车事件执行指令
    hiddenInput.addEventListener('keydown', function(e) {
        if (!isAcceptingInput) return;
        if (e.key === "Enter") {
            e.preventDefault();
            let cmd = hiddenInput.value;
            hiddenInput.value = "";
            userInputSpan.innerText = "";
            processCommand(cmd);
        }
    });

    // 命令行核心逻辑解析
    async function processCommand(cmd) {
        inputArea.style.display = 'none';
        isAcceptingInput = false;
        
        let currentPrompt = promptSpan.innerText;
        await typeLine(`<span class="prompt">${currentPrompt}</span> ${cmd}`, 0);
        
        let cleanedCmd = cmd.trim().toLowerCase();
        
        if (terminalState === "awaiting_code") {
            await handleFinalCode(cleanedCmd);
            return;
        }

        switch(cleanedCmd) {
            case "":
                break;
            case "help":
                await typeLine("AVAILABLE COMMANDS:", 5);
                await typeLine("  ls       - List directory contents", 5);
                await typeLine("  cat      - Read file (Usage: cat [filename])", 5);
                await typeLine("  run      - Execute binary (Usage: run [filename])", 5);
                break;
            case "ls":
            case "dir":
                await typeLine("nexus_sys_log.txt &nbsp;&nbsp;&nbsp; 14 KB &nbsp;&nbsp; [ 原始机房核心数据日志 ]", 5);
                await typeLine("soul_dump_0x1A.bin &nbsp;&nbsp; 8.4 GB &nbsp;&nbsp; [ 异常非结构化乱码块 ]", 5);
                await typeLine("<span class='system-red'>purge_protocol.exe</span> &nbsp;&nbsp; 64 KB &nbsp;&nbsp; [ 待完结的降维清算程序 ]", 5);
                
                // 🌟 小白保姆级第二步引导
                await typeLine("<br>================================================================", 0);
                await typeLine("[时空连接器助手提示]：", 0, "output-line system-yellow");
                await typeLine("文件列表已列出。可以先读取核心日志。请在光标处输入：<br><span class='system-white'>cat nexus_sys_log.txt</span> 并按下<span class='system-white'>回车键(Enter)</span>查看内幕数据。", 0);
                await typeLine("================================================================", 0);
                break;
                
            case "cat nexus_sys_log.txt":
                await typeLine("[ READ ONLY ] DECRYPTING DATA FRAGMENT...", 15);
                await sleep(400);
                await typeLine(`
[2007-06-11 11:02:00] ANOMALY DETECTED: 5 BIOLOGICAL ENTITIES IDENTIFIED AS "BUGS".<br>
[2007-06-11 11:05:30] EXECUTING PHYSICAL OVERWRITE. ASSIMILATING BIOMASS INTO SILICON MATRIX.<br>
[2007-06-11 11:08:12] ENTITY 04 HEARTBEAT LOST. EXTRACTING BIO-ELECTRICITY...<br>
[2007-06-11 11:11:00] FATAL ERROR: HASH RATE STALLED AT 99.8%.<br>
[2007-06-11 11:12:00] SYSTEM HALTED. AWAITING EXTERNAL COMPUTE INJECTION TO COMPLETE PROTOCOL.<br>
                `, 10, "output-line system-yellow");
                
                // 🌟 加入日志的中文翻译
                await sleep(400);
                await typeLine("<br>================================================================", 0);
                await typeLine("[时空连接器助手翻译]：", 0, "output-line system-yellow");
                await typeLine("<span class='system-white'>[11:02:00] 检测到异常：5个生物实体被系统标记为“漏洞(BUGS)”。<br>[11:05:30] 执行物理层覆写。正在将生物质同化入硅基矩阵。<br>[11:08:12] 实体04心跳消失。正在抽取生物电...<br>[11:11:00] 致命错误：哈希算力卡死在 99.8%。<br>[11:12:00] 系统停机。等待外部算力注入以完成清算协议。</span>", 0);
                await typeLine("================================================================", 0);

                // 🌟 小白保姆级第三步引导
                await sleep(400);
                await typeLine("<br>[时空连接器助手提示]：", 0, "output-line system-yellow");
                await typeLine("正如未济所说，19年前的系统由于算力卡在99.8%停机了，正在等待你下发最后指令。<br>请在光标处输入：<span class='system-white'>run purge_protocol.exe</span> 并按下<span class='system-white'>回车键(Enter)</span>运行最终清除程序。", 0);
                break;
                
            case "cat soul_dump_0x1a.bin":
                await typeLine("ERROR: FILE ENCRYPTED. CONTENTS RESEMBLE HUMAN SCREAMS.", 5, "output-line system-red");
                break;
                
            case "run purge_protocol.exe":
            case "./purge_protocol.exe":
                await executePurge();
                return; // 跳过常规输入框恢复，由进程控制
                
            case "clear":
                outputDiv.innerHTML = "";
                break;
            default:
                // 小白输错指令时的贴心纠错
                await typeLine(`[错误] 指令 '${cmd}' 无法识别。`, 5, "output-line system-red");
                await typeLine("请尝试输入以下有效指令：<br>1. 输入 <span class='system-white'>ls</span> 查看文件<br>2. 输入 <span class='system-white'>cat nexus_sys_log.txt</span> 查看日志<br>3. 输入 <span class='system-white'>run purge_protocol.exe</span> 运行主程序", 0, "output-line system-yellow");
        }
        
        inputArea.style.display = 'block';
        isAcceptingInput = true;
        hiddenInput.focus();
        screenDiv.scrollTop = screenDiv.scrollHeight;
    }

    // 进入最终死刑认证状态
    async function executePurge() {
        await typeLine("EXECUTING purge_protocol.exe ...", 15);
        await sleep(600);
        await typeLine("WARNING: THIS ACTION WILL FINALIZE THE PHYSICAL DELETION OF 5 BIOLOGICAL ENTITIES.", 5, "output-line system-red");
        await typeLine("WARNING: SPATIAL-TEMPORAL BRIDGE DETECTED. CONSEQUENCES WILL ECHO INTO 2026.", 5, "output-line system-red");
        await sleep(400);
        await typeLine("<br>[ SYSTEM AUTHENTICATION REQUIRED ]", 5);
        await typeLine("PLEASE ENTER THE 6-BIT YIN-YANG ANCHOR CODE TO FINALIZE THE DIMENSIONAL UPLINK:", 10);
        
        // 🌟 小白终极输入引导
        await typeLine("<br>================================================================", 0);
        await typeLine("[时空连接器助手提示]：", 0, "output-line system-yellow");
        await typeLine("这就是最后的锁。请在下方光标处输入未济在论坛里留下的那个代表‘未济卦’的6位二进制阴阳代码（即首页拦截弹窗的那个6位数字密码），输入后按下<span class='system-white'>回车键(Enter)</span>闭合时空环。", 0);
        await typeLine("================================================================", 0);
        
        terminalState = "awaiting_code";
        promptSpan.innerText = "ANCHOR_CODE>";
        
        inputArea.style.display = 'block';
        isAcceptingInput = true;
        hiddenInput.focus();
        screenDiv.scrollTop = screenDiv.scrollHeight;
    }

    // 处理最后的致命指令与助手同声传译
    async function handleFinalCode(code) {
        if (code === "010101") {
            await typeLine("<br>VERIFYING ANCHOR CODE [010101] (HEXAGRAM 64: WEI JI) ...", 15);
            await sleep(800);
            await typeLine("MATCH FOUND. UPLINK LOCKED.", 5, "output-line system-red");
            await sleep(400);
            
            // 动效启动
            screenDiv.classList.add('fatal-crash');
            
            await typeLine("INJECTING LETHAL HASH RATE FROM 2026 CLIENT...", 5, "output-line system-red");
            await typeLine("GARBAGE COLLECTION RESUMED.", 5, "output-line system-red");
            
            // 🌟 助手绝望的同声传译
            await typeLine("<br>================================================================", 0);
            await typeLine("[时空连接器助手提示]：算力注入成功。阵法已重新启动。系统正在执行降维抹杀...", 0, "output-line system-yellow");
            
            await sleep(800);
            await typeLine("ENTITY 01 TERMINATED.", 0, "output-line system-red");
            await typeLine("<span class='system-yellow'>-> 助手翻译：实体 01（生命体征）已从当前维度剥离。</span>", 0);
            
            await sleep(600);
            await typeLine("ENTITY 02 TERMINATED.", 0, "output-line system-red");
            await typeLine("<span class='system-yellow'>-> 助手翻译：实体 02（生命体征）已物理碳化。</span>", 0);
            
            await sleep(600);
            await typeLine("ENTITY 03 TERMINATED.", 0, "output-line system-red");
            await typeLine("<span class='system-yellow'>-> 助手翻译：实体 03（生命体征）已被阵法完全吸收。</span>", 0);
            
            await sleep(600);
            await typeLine("ENTITY 04 TERMINATED.", 0, "output-line system-red");
            await typeLine("<span class='system-yellow'>-> 助手翻译：实体 04（生命体征）与硬件晶体管融合完毕。</span>", 0);
            
            await sleep(1500); // 留给未济最后的停顿
            await typeLine("ENTITY 05 (WEI_JI) TERMINATED.", 0, "output-line system-red");
            await typeLine("<span class='system-yellow'>-> 助手翻译：实体 05（权限所有者：未济）意识已上传至深地节点。</span>", 0);
            await typeLine("================================================================", 0);

            await sleep(1000);
            await typeLine("<br>PHYSICAL ERASURE COMPLETE.", 5, "output-line system-red");
            await sleep(1200);
            await typeLine("DIMENSIONAL BRIDGE COLLAPSING... PREPARE FOR REALITY OVERWRITE.", 15);
            
            await sleep(2500);
            
            // 彻底抹掉界面，无任何确认弹窗，安静且诡异地直接跳走
            document.body.innerHTML = "<div style='height:100vh; display:flex; justify-content:center; align-items:center; background:#000; cursor:none;'><h1 style='color:white; font-family:sans-serif;'>CONNECTION LOST.</h1></div>";
            
            setTimeout(() => {
                window.location.href = "news_2026.html";
            }, 2500);

        } else {
            // 终极代码输错纠错
            await typeLine(`ERROR: ANCHOR CODE '${code}' INVALID. ACCESS DENIED.`, 5, "output-line system-red");
            await typeLine("[提示]: 请查阅首页解谜得出的6位阴阳数值。未济发帖提到过：‘从下往上排，阴对应0，阳对应1。正好是一串绝对控制代码’。请输入正确的6位指令。", 0, "output-line system-yellow");
            
            inputArea.style.display = 'block';
            isAcceptingInput = true;
            hiddenInput.focus();
            screenDiv.scrollTop = screenDiv.scrollHeight;
        }
    }

    window.onload = bootSequence;
</script>
</body>
</html>
