<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>四维观测系统 · 物理终端</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
/* ================= 基础重置 ================= */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #030508; font-family: 'Courier New', monospace; overflow: hidden; -webkit-font-smoothing: antialiased; }

/* ================= 1. 前置观测终端 (青冥镜视界) ================= */
#mirror-overlay { 
    position: fixed; inset: 0; z-index: 9999; 
    background: #020305;
    display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; 
}

/* 动态真实星空底层画布 */
#bg-stars { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

/* 镜体主容器：保持绝对正圆 */
#mirror-wrap { 
    position: relative; width: 85vmin; height: 85vmin; max-width: 550px; max-height: 550px; 
    border-radius: 50%; box-shadow: 0 0 60px rgba(0,0,0,1), 0 0 150px rgba(10, 20, 30, 0.5); 
    z-index: 10;
}

/* 镜子中心的深渊底色 */
#mirror-glass {
    position: absolute; inset: 4%; border-radius: 50%;
    background: radial-gradient(circle at 50% 50%, #0c1824 0%, #04080c 60%, #000 100%);
    box-shadow: inset 0 0 50px rgba(0,0,0,1);
    overflow: hidden; z-index: 2;
}

/* 高清黄铜拉丝立体外框 SVG */
#mirror-svg-frame { position: absolute; inset: -8%; width: 116%; height: 116%; pointer-events: none; z-index: 5; }

/* 模拟雪花屏噪点与扫描线 */
#mirror-noise { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0.45; mix-blend-mode: screen; z-index: 3; }
.scanlines { position: absolute; inset: 0; background: repeating-linear-gradient(to bottom, transparent 0px, transparent 2px, rgba(0,0,0,0.5) 3px, rgba(0,0,0,0.5) 4px); z-index: 4; pointer-events: none; opacity: 0.8; }

/* 底部状态文本与操作轴 */
.mirror-text-container { margin-top: 5vmin; display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 10; }
.mirror-text { color: #5a738a; font-size: clamp(12px, 3vmin, 14px); text-align: center; line-height: 2; letter-spacing: 0.15em; text-shadow: 0 0 5px #000; }
.mirror-text .highlight { color: #b09060; font-weight: bold; }

#mirror-btn { 
    padding: 12px 35px; background: rgba(5,10,15,0.8); border: 1px solid #6b5119; 
    color: #cda45a; font-family: 'Courier New', monospace; font-size: 13px; 
    cursor: pointer; letter-spacing: 0.2em; transition: all 0.4s ease; 
    display: flex; align-items: center; gap: 10px;
}
#mirror-btn:hover { border-color: #d4a017; color: #fff; background: rgba(20, 15, 5, 0.9); box-shadow: 0 0 20px rgba(212, 160, 23, 0.2) inset; }

/* ================= 2. 电影级缓动展开画布 ================= */
#mirror-expand { position: fixed; inset: 0; z-index: 9998; display: none; pointer-events: none; }
#mirror-expand canvas { width: 100%; height: 100%; }

/* ================= 3. 主系统界面 (沿用之前的布局) ================= */
#app { display: none; width: 100vw; height: 100vh; position: relative; }
#map { position: absolute; inset: 0; background: #000; z-index: 1; }

#sidebar { 
    position: absolute; top: 0; right: 0; z-index: 1000; 
    background: rgba(5,13,15,0.92); border-left: 1px solid #1a3a3a; 
    height: 100%; width: 280px; display: flex; flex-direction: column; 
    backdrop-filter: blur(5px); 
}

#tab-bar { display: flex; border-bottom: 1px solid #1a3a3a; flex-shrink: 0; }
.tab { flex: 1; padding: 12px 4px; font-size: 12px; text-align: center; color: #2a5a5a; cursor: pointer; border: none; background: transparent; font-family: inherit; font-weight: bold; transition: 0.2s; }
.tab.active { color: #00ffcc; border-bottom: 2px solid #00ffcc; background: rgba(0,255,204,0.05); }

.tab-content { display: none; flex: 1; overflow-y: auto; padding: 15px; gap: 10px; flex-direction: column; }
.tab-content.active { display: flex; }

h4 { font-size: 12px; color: #00ffcc88; letter-spacing: 0.1em; margin-bottom: 4px; border-left: 2px solid #00ffcc88; padding-left: 6px; }
.sec { background: rgba(10,26,26,0.6); border: 1px solid #1a3a3a; padding: 10px; border-radius: 4px; }
.sec label { font-size: 11px; color: #3a7a7a; display: block; margin-bottom: 5px; }
.sec input, .sec select { width: 100%; background: #050d0f; border: 1px solid #1a3a3a; color: #7fbfbf; font-size: 12px; padding: 6px; border-radius: 3px; font-family: inherit; outline: none; margin-bottom: 5px; }
.sec-val { font-size: 11px; color: #4a8a8a; line-height: 1.6; margin-top: 5px; white-space: pre-line; background: #000; padding: 6px; border-radius: 3px; }

.apply-btn { width: 100%; padding: 8px; background: transparent; border: 1px solid #00ffcc44; color: #00ffccaa; font-family: inherit; font-size: 12px; cursor: pointer; transition: 0.2s; border-radius: 3px; margin-top: 5px; }
.apply-btn:hover { border-color: #00ffcc; color: #00ffcc; background: rgba(0,255,204,0.1); }

#nine-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; margin-top: 10px; }
.gong { padding: 8px 2px; border-radius: 3px; text-align: center; border: 1px solid #1a3a3a; background: #050d0f; color: #546e7a; cursor: pointer; transition: 0.2s; }
.gong .gn { font-size: 12px; font-weight: bold; margin-bottom: 4px; }
.gong .gm { font-size: 11px; }
.gong.conflict { border-color: #fff; color: #fff; background: rgba(255,255,255,0.1); animation: flicker 0.5s infinite alternate; }

@keyframes flicker { from { box-shadow: 0 0 2px #fff inset; } to { box-shadow: 0 0 8px #fff inset; } }

#gong-detail { display: none; position: absolute; z-index: 1001; background: rgba(5,13,15,0.95); border: 1px solid #1a3a3a; box-shadow: 0 0 20px rgba(0,0,0,0.8); border-radius: 6px; padding: 15px; min-width: 200px; color: #7fbfbf; line-height: 1.8; backdrop-filter: blur(5px); }
#gong-detail h5 { font-size: 13px; color: #00ffcc; margin-bottom: 8px; border-bottom: 1px dashed #1a3a3a; padding-bottom: 5px; }
#gong-detail .close-btn { position: absolute; top: 12px; right: 12px; background: none; border: none; color: #546e7a; cursor: pointer; font-size: 14px; }

@media (max-width: 768px) {
    #sidebar { top: auto; bottom: 0; width: 100%; height: 45%; border-left: none; border-top: 1px solid #00ffcc44; }
    #map { height: 55%; }
    #gong-detail { top: 10%; left: 50%; transform: translateX(-50%); width: 80%; max-width: 300px; }
    .sec { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
    .sec label { width: 100%; margin: 0; }
    .sec select, .sec input { width: 48%; margin: 0; }
    .apply-btn { width: 100%; margin-top: 5px; }
}
</style>
</head>

<script>
// ================= 1. 视差星空系统 =================
(function initStars() {
    const canvas = document.getElementById('bg-stars');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        stars = [];
        // 生成 300 颗星星，赋予不同景深 (z)
        for(let i=0; i<300; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                z: Math.random() * 2 + 0.1, 
                opacity: Math.random(),
                flicker: Math.random() * 0.05
            });
        }
    }
    window.addEventListener('resize', resize);
    resize();

    function renderStars() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        stars.forEach(s => {
            // 极其缓慢的向左上角移动（宇宙漂移感）
            s.x -= 0.1 / s.z;
            s.y -= 0.05 / s.z;
            if(s.x < 0) s.x = canvas.width;
            if(s.y < 0) s.y = canvas.height;
            
            s.opacity += s.flicker;
            if(s.opacity > 1 || s.opacity < 0.2) s.flicker = -s.flicker;

            ctx.beginPath();
            ctx.arc(s.x, s.y, 1.2 / s.z, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(200, 220, 255, ${s.opacity})`;
            ctx.fill();
        });
        if(document.getElementById('mirror-overlay').style.display !== 'none') {
            requestAnimationFrame(renderStars);
        }
    }
    renderStars();
})();

// ================= 2. 模拟真实雪花屏噪点 =================
(function initNoise(){
  const canvas = document.getElementById('mirror-noise');
  const ctx = canvas.getContext('2d');
  
  function resizeCanvas() {
    canvas.width = canvas.parentElement.clientWidth;
    canvas.height = canvas.parentElement.clientHeight;
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  function drawNoise(){
    if(document.getElementById('mirror-overlay').style.display === 'none') return;
    const w = canvas.width, h = canvas.height;
    if(w === 0) return;
    
    const idata = ctx.createImageData(w, h);
    const d = idata.data;
    // 黑白/灰阶高频噪点
    for(let i=0; i<d.length; i+=4){
      const v = Math.random() * 255 | 0;
      d[i] = v; d[i+1] = v; d[i+2] = v; d[i+3] = 45; // 低透明度叠加
    }
    ctx.putImageData(idata, 0, 0);
    requestAnimationFrame(drawNoise);
  }
  drawNoise();
})();

// ================= 3. 电影级缓慢展开动画 =================
function playCinematicExpand(cb){
  const overlay = document.getElementById('mirror-expand');
  const canvas = document.getElementById('expand-canvas');
  overlay.style.display = 'block';
  
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  window.addEventListener('resize', resize);
  resize();

  const ctx = canvas.getContext('2d');
  let cx = canvas.width/2, cy = canvas.height/2;
  const maxR = Math.sqrt(cx*cx + cy*cy);
  
  // 起始半径设定为当前镜子UI的实际半径
  let r = Math.min(canvas.width, canvas.height) * 0.4; 
  let alpha = 1;
  let phase = 0;

  function frame(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    cx = canvas.width/2; cy = canvas.height/2;

    if(phase === 0){
      ctx.save();
      // 外部深渊黑遮罩
      ctx.beginPath();
      ctx.rect(0, 0, canvas.width, canvas.height);
      ctx.arc(cx, cy, r, 0, Math.PI*2, true); 
      ctx.fillStyle = `rgba(3, 5, 8, ${alpha})`;
      ctx.fill();

      // 金色边界光晕
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
      ctx.strokeStyle = `rgba(205,164,90,${alpha * 0.8})`;
      ctx.lineWidth = 4; ctx.stroke();
      ctx.restore();
      
      // 缓动算法：速度随距离衰减，但保持一个基础推力
      r += Math.max((maxR - r) * 0.03, 3);
      if(r > maxR) phase = 1;
    } else {
      // 缓慢淡出
      alpha -= 0.015;
      ctx.fillStyle = `rgba(3, 5, 8, ${Math.max(0, alpha)})`;
      ctx.fillRect(0,0,canvas.width,canvas.height);
      if(alpha <= 0){
        overlay.style.display = 'none';
        window.removeEventListener('resize', resize);
        cb(); return;
      }
    }
    requestAnimationFrame(frame);
  }
  frame();
}

document.getElementById('mirror-btn').onclick = () => {
  document.getElementById('mirror-overlay').style.display = 'none';
  playCinematicExpand(() => {
    const app = document.getElementById('app');
    app.style.display = 'block';
    if (!map) { initMap(); } else { map.invalidateSize(); }
  });
};

// ================= 4. UI 选项卡与排盘引擎 =================
document.querySelectorAll('.tab').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  };
});
document.getElementById('close-detail').onclick = () => { document.getElementById('gong-detail').style.display = 'none'; };

// (保留之前的排盘算法基底)
const LON=120.12; const CENTER=[30.2558, 120.1222]; const SPAN=0.0035; 
const NAMES={4:'巽',9:'离',2:'坤',3:'震',5:'中',7:'兑',8:'艮',1:'坎',6:'乾'};
const SHI=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const GONG_OFF={4:[SPAN,-SPAN],9:[SPAN,0],2:[SPAN,SPAN],3:[0,-SPAN],5:[0,0],7:[0,SPAN],8:[-SPAN,-SPAN],1:[-SPAN,0],6:[-SPAN,SPAN]};
const JSTARS={1:'天蓬',2:'天芮',3:'天冲',4:'天辅',5:'天禽',6:'天心',7:'天柱',8:'天任',9:'天英'};
const BMYANG=['休','死','伤','杜','景','开','惊','生','景'];
const BMYIN=['休','生','伤','杜','景','死','惊','开','景'];

const YJIDX=[1,2,3,4,5,6,7,8,9]; const YINJIDX=[9,8,7,6,5,4,3,2,1];
function trueSolar(d){return new Date(d.getTime()+(LON-120)*4*60000);}
function shiIdx(d){return Math.floor(d.getHours()/2);}
function zhiFu(ju,yang,si){
  if(yang){const o=[1,2,3,4,5,6,7,8,9];return o[(ju-1+si)%9];}
  else{const o=[9,8,7,6,5,4,3,2,1];return o[(9-ju+si)%9];}
}
function getBaMen(zfg,yang){
  const ma=yang?BMYANG:BMYIN;const o=[1,2,3,4,5,6,7,8,9];
  const si=o.indexOf(zfg);const r={};
  o.forEach((g,i)=>{r[g]=ma[(si+i)%9];});return r;
}
function getStars(zfg){
  const o=[1,2,3,4,5,6,7,8,9];const si=o.indexOf(zfg);const r={};
  o.forEach((g,i)=>{r[g]=JSTARS[o[(si+i)%9]];});return r;
}
function fmtDate(d){return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${SHI[shiIdx(trueSolar(d))]}时`;}

let map, deadLayers=[], liveLayers=[];
let deadDateObj = new Date(2007,5,11,11,0);
let liveDateObj = new Date();
let lastDeadData = {}, lastLiveData = {};

function setNow(){
  const now = new Date();
  const local = new Date(now.getTime() - now.getTimezoneOffset()*60000);
  document.getElementById('live-time').value = local.toISOString().slice(0,16);
  liveDateObj = now;
}

function showGongDetail(pos){
  const d = lastDeadData[pos], l = lastLiveData[pos];
  if(!d || !l) return;
  const conflict = (d.men === l.men);
  const detail = document.getElementById('gong-detail');
  if(window.innerWidth > 768) { detail.style.top = '20px'; detail.style.right = '300px'; detail.style.left = 'auto'; detail.style.bottom = 'auto'; }
  document.getElementById('detail-title').textContent = `${NAMES[pos]}${pos}宫 比对`;
  document.getElementById('detail-body').innerHTML = `
    <div style="color:#cd5c5c;font-size:12px;margin-bottom:4px;">L2死盘: 星[${d.star}] 门[${d.men}]</div>
    <div style="color:#00ffcc;font-size:12px;">L3活盘: 星[${l.star}] 门[${l.men}]</div>
    ${conflict ? `<div style="margin-top:10px;color:#fff;font-weight:bold;animation:flicker .5s infinite alternate;">⚠ 伏吟死锁</div>` : ''}
  `;
  detail.style.display = 'block';
}

function initMap(){
  setNow();
  map = L.map('map',{zoomControl:false, attributionControl:false}).setView(CENTER, 18);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:20}).addTo(map);
  updateEngine();
}

function updateEngine(){
  const deadSi = shiIdx(trueSolar(deadDateObj));
  const deadZF = zhiFu(3, true, deadSi); // 固定阳遁三局模拟
  const deadMen = getBaMen(deadZF, true);
  const deadStars = getStars(deadZF);

  const liveSi = shiIdx(trueSolar(liveDateObj));
  const liveZF = zhiFu(1, true, liveSi); // 简易推流
  const liveMen = getBaMen(liveZF, true);
  const liveStars = getStars(liveZF);

  document.getElementById('dead-info').textContent = `[${fmtDate(deadDateObj)}]\n阳遁3局 | 值符：${NAMES[deadZF]}`;
  document.getElementById('live-info').textContent = `[${fmtDate(liveDateObj)}]\n阳遁1局 | 值符：${NAMES[liveZF]}`;

  deadLayers.forEach(l => map.removeLayer(l)); deadLayers.length=0;
  liveLayers.forEach(l => map.removeLayer(l)); liveLayers.length=0;

  Object.entries(GONG_OFF).forEach(([posStr, [dlat, dlng]]) => {
    const pos = parseInt(posStr);
    const lat = CENTER[0] + dlat, lng = CENTER[1] + dlng;
    const dm = deadMen[pos], lm = liveMen[pos];
    const conflict = (dm === lm);

    lastDeadData[pos] = {men: dm, star: deadStars[pos]};
    lastLiveData[pos] = {men: lm, star: liveStars[pos]};

    const bounds = [[lat-SPAN/2, lng-SPAN/2], [lat+SPAN/2, lng+SPAN/2]];
    const dr = L.rectangle(bounds, { color: conflict?'#fff':'#cd5c5c', fillColor: conflict?'#fff':'transparent', fillOpacity: conflict?.15:0, weight: conflict?2:1 }).addTo(map);
    dr.on('click', () => showGongDetail(pos)); deadLayers.push(dr);

    if(!conflict) {
      const boundsL3 = [[lat-SPAN/2+0.0001, lng-SPAN/2+0.0001], [lat+SPAN/2-0.0001, lng+SPAN/2-0.0001]];
      const lr = L.rectangle(boundsL3, { color: '#00ffcc', fillOpacity: 0, weight: 1.5, dashArray: '4 4' }).addTo(map);
      lr.on('click', () => showGongDetail(pos)); liveLayers.push(lr);
    }

    const lbl = L.marker([lat, lng], {icon: L.divIcon({ html: `<div style="font-size:14px;font-weight:bold;color:${conflict?'#fff':'#546e7a'};text-shadow:0 0 3px #000;cursor:pointer;">${NAMES[pos]}${pos}</div>`, className: '', iconAnchor: [15, 10] })}).addTo(map);
    lbl.on('click', () => showGongDetail(pos)); liveLayers.push(lbl);

    const el = document.getElementById('g'+pos);
    el.className = 'gong' + (conflict ? ' conflict' : '');
    el.querySelector('.gm').innerHTML = conflict ? '伏吟' : `<span style="color:#cd5c5c">${dm}</span> <span style="color:#00ffcc">${lm}</span>`;
    el.onclick = () => showGongDetail(pos);
  });
}

document.getElementById('use-now-btn').onclick = () => { setNow(); updateEngine(); };
document.getElementById('apply-dead').onclick = () => { if(document.getElementById('dead-time').value){ deadDateObj = new Date(document.getElementById('dead-time').value); updateEngine(); } };
document.getElementById('apply-live').onclick = () => { if(document.getElementById('live-time').value){ liveDateObj = new Date(document.getElementById('live-time').value); updateEngine(); } };
</script>
</body>
</html>
