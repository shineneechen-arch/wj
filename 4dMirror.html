<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>青冥鉴 · 四维拓扑观测终端</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
/* ================= 基础与色彩重置 ================= */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #020304; font-family: 'Courier New', Consolas, monospace; overflow: hidden; -webkit-font-smoothing: antialiased; color: #e0e0e0; }

:root {
  --bg-dark: #090e12;
  --bg-panel: #0d151c;
  --border-line: #1f2d3d;
  --text-main: #c5d4e8;
  --text-mute: #6c8299;
  --color-l1: #ffb703; /* L1改为高亮亮色，用于框出南江大学 */
  --color-l2: #a33131;
  --color-l3: #00e5ff;
  --color-conflict: #ffffff;
  --color-gold: #cda45a;
  
  --label-scale: 1; /* 地图字体动态缩放基准 */
}

/* ================= 1. 高精密宇宙背景与青冥鉴 ================= */
#mirror-overlay { 
  position: fixed; inset: 0; z-index: 9999; background: #000;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}

#bg-stars { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

#mirror-wrap { 
  position: relative; width: 80vmin; height: 80vmin; max-width: 550px; max-height: 550px; 
  border-radius: 50%; box-shadow: 0 0 80px #000, inset 0 0 20px #000; z-index: 10;
}

#mirror-glass {
  position: absolute; inset: 4%; border-radius: 50%;
  background: #050a0f; box-shadow: inset 0 0 60px #000;
  overflow: hidden; z-index: 2;
  background-image: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 40%, rgba(255,255,255,0) 100%);
}

#mirror-svg-frame { position: absolute; inset: -10%; width: 120%; height: 120%; pointer-events: none; z-index: 5; }

#mirror-video { 
  position: absolute; width: 110%; height: 110%; top: -5%; left: -5%;
  object-fit: cover; opacity: 0; transition: opacity 2s ease;
  filter: blur(6px) contrast(1.3) brightness(0.6) sepia(0.4) hue-rotate(180deg); 
  mix-blend-mode: hard-light;
}

#mirror-noise { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; transition: opacity 1s; mix-blend-mode: screen; }

.mirror-text-container { margin-top: 5vmin; z-index: 10; text-align: center; }
.mirror-text { color: #5a738a; font-size: clamp(12px, 3vmin, 14px); line-height: 2; letter-spacing: 0.15em; text-shadow: 0 0 5px #000; }
.mirror-text .highlight { color: var(--color-gold); font-weight: bold; }

#mirror-btn { 
  margin-top: 15px; padding: 12px 35px; background: rgba(5,10,15,0.8); 
  border: 1px solid #6b5119; color: var(--color-gold); 
  font-family: inherit; font-size: 14px; cursor: pointer; letter-spacing: 0.2em; 
  transition: 0.5s; box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
  display: none; 
}
#mirror-btn:hover { background: rgba(205,164,90,0.1); border-color: var(--color-gold); color: #fff; box-shadow: 0 0 20px rgba(212, 160, 23, 0.3) inset, 0 0 10px rgba(212,160,23,0.5); }

#mirror-expand { position: fixed; inset: 0; z-index: 9998; display: none; pointer-events: none; }
#mirror-expand canvas { width: 100%; height: 100%; }

/* ================= 2. 主观测系统与地图 ================= */
#app { display: none; width: 100vw; height: 100vh; position: relative; }
#map { position: absolute; inset: 0; background: #000; z-index: 1; }

/* 北标仪 (North Indicator) */
#north-indicator {
  position: absolute; top: 30px; right: 320px; z-index: 1000;
  display: flex; flex-direction: column; align-items: center;
  pointer-events: none; opacity: 0.8;
}
.n-arrow {
  width: 0; height: 0;
  border-left: 12px solid transparent; border-right: 12px solid transparent;
  border-bottom: 35px solid var(--color-l1);
  filter: drop-shadow(0 0 8px var(--color-l1));
  margin-bottom: 5px;
}
.n-text { color: var(--color-l1); font-weight: bold; font-size: 24px; text-shadow: 0 0 10px var(--color-l1); }

/* 剧情引导弹窗 */
#narrative-dialog {
  position: absolute; top: 20%; left: 50%; transform: translate(-50%, -50%);
  background: rgba(5,13,15,0.95); border: 1px solid var(--color-gold);
  box-shadow: 0 0 30px rgba(0,0,0,0.9), 0 0 15px rgba(205,164,90,0.2) inset;
  padding: 30px; text-align: center; color: var(--color-gold); z-index: 2000;
  border-radius: 4px; display: none; width: 85%; max-width: 450px; backdrop-filter: blur(10px);
}
#narrative-dialog p { font-size: 15px; line-height: 2; margin-bottom: 25px; letter-spacing: 0.1em; }
#narrative-dialog button { 
    background: rgba(0,0,0,0.5); border: 1px solid var(--border-line); color: var(--text-mute); 
    padding: 12px 30px; cursor: pointer; font-family: inherit; transition: 0.3s; 
    border-radius: 3px; font-size: 15px;
}
#narrative-dialog button:hover { border-color: #ff4d4d; box-shadow: 0 0 15px rgba(255, 77, 77, 0.2); }

/* PS图层控制器 */
#layer-panel {
  position: absolute; top: 20px; left: 20px; z-index: 1000;
  background: rgba(13,21,28,0.9); border: 1px solid var(--border-line);
  border-radius: 6px; padding: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
  backdrop-filter: blur(8px); width: 260px;
}
.layer-title { font-size: 12px; color: var(--text-mute); border-bottom: 1px dashed var(--border-line); padding-bottom: 6px; margin-bottom: 8px; font-weight: bold; }
.layer-item { 
  display: flex; align-items: center; justify-content: space-between; 
  padding: 8px 10px; margin-bottom: 4px; background: rgba(0,0,0,0.4); 
  border: 1px solid transparent; border-radius: 4px; cursor: pointer; transition: 0.2s;
  font-size: 12px; color: var(--text-main);
}
.layer-item:hover { background: rgba(255,255,255,0.05); border-color: #334455; }
.layer-item .eye { font-size: 16px; color: #555; transition: 0.2s; }
.layer-item.active { border-left: 3px solid; background: rgba(255,255,255,0.02); }
.layer-item.active .eye { color: #fff; text-shadow: 0 0 5px #fff; }
.layer-l1.active { border-left-color: var(--color-l1); }
.layer-l2.active { border-left-color: var(--color-l2); }
.layer-l3.active { border-left-color: var(--color-l3); }
.layer-name { flex: 1; margin-left: 10px; display: flex; flex-direction: column; }
.layer-desc { font-size: 10px; color: var(--text-mute); margin-top: 2px; }

/* 侧边栏 */
#sidebar { 
  position: absolute; top: 0; right: 0; z-index: 1000; 
  background: rgba(9,14,18,0.95); border-left: 1px solid var(--border-line); 
  height: 100%; width: 280px; display: flex; flex-direction: column; 
  backdrop-filter: blur(10px); box-shadow: -10px 0 30px rgba(0,0,0,0.8);
}
.tab-content { display: flex; flex: 1; overflow-y: auto; padding: 15px; gap: 15px; flex-direction: column; }
h4 { font-size: 13px; color: #8fa6c0; border-left: 2px solid var(--color-l3); padding-left: 8px; margin-bottom: 4px; }
.sec { background: rgba(0,0,0,0.3); border: 1px solid var(--border-line); padding: 12px; border-radius: 4px; }
.sec label { font-size: 11px; color: var(--text-mute); display: block; margin-bottom: 6px; }
.sec input { width: 100%; background: #000; border: 1px solid #334455; color: #fff; font-size: 12px; padding: 8px; border-radius: 3px; font-family: inherit; margin-bottom: 5px; outline: none; }
.apply-btn { width: 100%; padding: 10px; background: transparent; border: 1px solid #334455; color: #8fa6c0; font-family: inherit; font-size: 12px; cursor: pointer; transition: 0.2s; border-radius: 3px; margin-top: 5px; }
.apply-btn:hover { border-color: var(--color-l3); color: var(--color-l3); background: rgba(0,229,255,0.05); }

/* ================= 地图动态文字缩放控制 ================= */
.map-label-l1 { 
  font-family: 'Courier New', monospace; 
  /* 核心：利用 CSS 变量根据 Zoom 层级进行动态缩放 */
  font-size: calc(14px * var(--label-scale)) !important; 
  color: #fff; background: rgba(10,20,30,0.8); 
  border: 1px solid var(--border-line); border-radius: 4px; 
  padding: calc(4px * var(--label-scale)) calc(8px * var(--label-scale)); 
  white-space: nowrap; text-align: center; text-shadow: 0 0 5px #000; 
  box-shadow: 0 0 10px rgba(0,0,0,0.8); transition: font-size 0.2s, padding 0.2s;
}
.map-label-l1.danger { border-color: #a33131; color: #ffcccc; background: rgba(40,10,10,0.9); }
.map-label-l1.highlight-zone { border-color: var(--color-l1); color: var(--color-l1); background: rgba(0,0,0,0.9); }

/* 宫格内文字动态缩放 */
.gong-label {
  font-size: calc(14px * var(--label-scale));
  font-weight: bold; text-align: center; white-space: nowrap; transition: 0.2s;
}

/* 移动端适配 */
@media (max-width: 768px) {
  #sidebar { top: auto; bottom: 0; width: 100%; height: 40%; border-left: none; border-top: 1px solid var(--border-line); }
  #layer-panel { top: 10px; left: 10px; width: calc(100% - 20px); }
  #north-indicator { top: 20px; right: 20px; }
  #map { height: 60%; }
}
</style>
</head>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ================= 1. 真实视差高精星空背景 =================
(function initStars() {
    const canvas = document.getElementById('bg-stars');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function resize() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        stars = [];
        for(let i=0; i<400; i++) {
            stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, z: Math.random()*3+0.5, o: Math.random(), d: (Math.random()*0.02)-0.01 });
        }
    }
    window.addEventListener('resize', resize); resize();

    function renderStars() {
        if(document.getElementById('mirror-overlay').style.display === 'none') return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        stars.forEach(s => {
            s.x -= 0.2 / s.z; s.y -= 0.1 / s.z;
            if(s.x < 0) s.x = canvas.width; if(s.y < 0) s.y = canvas.height;
            s.o += s.d; if(s.o > 1 || s.o < 0.1) s.d = -s.d;
            ctx.beginPath(); ctx.arc(s.x, s.y, 1.5/s.z, 0, Math.PI*2);
            ctx.fillStyle = `rgba(180, 210, 255, ${s.o})`; ctx.fill();
        });
        requestAnimationFrame(renderStars);
    }
    renderStars();
})();

// ================= 2. 摄像头与雪花屏逻辑 =================
(function initMirror() {
    const video = document.getElementById('mirror-video');
    const noiseCanvas = document.getElementById('mirror-noise');
    const noiseCtx = noiseCanvas.getContext('2d');
    const btn = document.getElementById('mirror-btn');
    const text = document.getElementById('init-text');
    let isNoise = false;

    function resizeNoise() { noiseCanvas.width = noiseCanvas.parentElement.clientWidth; noiseCanvas.height = noiseCanvas.parentElement.clientHeight; }
    window.addEventListener('resize', resizeNoise); resizeNoise();

    function drawNoise() {
        if(!isNoise || noiseCanvas.style.display === 'none') return;
        const idata = noiseCtx.createImageData(noiseCanvas.width, noiseCanvas.height);
        const d = idata.data;
        for(let i=0; i<d.length; i+=4) { const v = Math.random()*255|0; d[i]=v; d[i+1]=v; d[i+2]=v; d[i+3]=80; }
        noiseCtx.putImageData(idata, 0, 0);
        requestAnimationFrame(drawNoise);
    }

    if(navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
        navigator.mediaDevices.getUserMedia({video: {facingMode: 'user'}})
        .then(stream => {
            video.srcObject = stream; video.style.opacity = '1';
            text.innerHTML = "[ 光学阵列已贯通 ]<br>物理特征捕获完毕，请注视深渊。";
            btn.style.display = 'inline-block';
        })
        .catch(() => {
            isNoise = true; noiseCanvas.style.opacity = '1'; drawNoise();
            text.innerHTML = "<span style='color:#a33131;'>[ 光学阵列被拒绝 ]</span><br>物理特征丢失，系统采用盲视降维协议。";
            btn.style.display = 'inline-block';
        });
    } else {
        isNoise = true; noiseCanvas.style.opacity = '1'; drawNoise();
        text.innerHTML = "[ 设备异常 ]<br>启动备用盲视协议。"; btn.style.display = 'inline-block';
    }
})();

// ================= 3. 展开动画 =================
function playCinematicExpand(cb){
  const overlay = document.getElementById('mirror-expand');
  const canvas = document.getElementById('expand-canvas');
  overlay.style.display = 'block';
  
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  window.addEventListener('resize', resize); resize();

  const ctx = canvas.getContext('2d');
  let cx = canvas.width/2, cy = canvas.height/2;
  const maxR = Math.sqrt(cx*cx + cy*cy) * 1.2;
  let r = Math.min(canvas.width, canvas.height) * 0.4; 
  let alpha = 1, phase = 0;

  function frame(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    cx = canvas.width/2; cy = canvas.height/2;

    if(phase === 0){
      ctx.save();
      ctx.beginPath(); ctx.rect(0, 0, canvas.width, canvas.height); ctx.arc(cx, cy, r, 0, Math.PI*2, true); 
      ctx.fillStyle = `rgba(2, 3, 5, ${alpha})`; ctx.fill();
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
      ctx.strokeStyle = `rgba(205,164,90,${alpha * 0.8})`; ctx.lineWidth = 4; ctx.stroke();
      ctx.restore();
      r += Math.max((maxR - r) * 0.04, 2);
      if(r > maxR) phase = 1;
    } else {
      alpha -= 0.02;
      ctx.fillStyle = `rgba(2, 3, 5, ${Math.max(0, alpha)})`; ctx.fillRect(0,0,canvas.width,canvas.height);
      if(alpha <= 0){ overlay.style.display = 'none'; window.removeEventListener('resize', resize); cb(); return; }
    }
    requestAnimationFrame(frame);
  }
  frame();
}

document.getElementById('mirror-btn').onclick = () => {
  const video = document.getElementById('mirror-video');
  if(video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
  document.getElementById('mirror-overlay').style.display = 'none';
  playCinematicExpand(() => {
    document.getElementById('app').style.display = 'block';
    if(!map) { initMap(); } else { map.invalidateSize(); }
    setTimeout(() => { document.getElementById('narrative-dialog').style.display = 'block'; }, 800);
  });
};

// ================= 4. 严谨拓扑地理引擎重构 =================
let map;
let l1Group, l2Group, l3Group;

const CENTER = [30.2558, 120.1222];
const SPAN = 0.0018; 
const NAMES = {1:'坎',8:'艮',3:'震',4:'巽',9:'离',2:'坤',7:'兑',6:'乾',5:'中'};

// 严格遵循地图坐标系：Lat(北为正)，Lng(东为正)
const GONG_OFF = {
    1: [SPAN, 0],       // 坎北
    8: [SPAN, SPAN],    // 艮东北
    3: [0, SPAN],       // 震东
    4: [-SPAN, SPAN],   // 巽东南
    9: [-SPAN, 0],      // 离南 (物理南大门与废弃仓库)
    2: [-SPAN, -SPAN],  // 坤西南
    7: [0, -SPAN],      // 兑西
    6: [SPAN, -SPAN],   // 乾西北
    5: [0, 0]           // 中
};

const BMYANG=['休','死','伤','杜','景','开','惊','生','景'];
const BMYIN=['休','生','伤','杜','景','死','惊','开','景'];

// 高亮南江大学专属矩形框范围
const campusBounds = [
    [CENTER[0] + SPAN*1.6, CENTER[1] - SPAN*1.6],
    [CENTER[0] + SPAN*1.6, CENTER[1] + SPAN*1.6],
    [CENTER[0] - SPAN*1.6, CENTER[1] + SPAN*1.6],
    [CENTER[0] - SPAN*1.6, CENTER[1] - SPAN*1.6]
];

let layersState = { L1: true, L2: true, L3: true };

function pseudoCalc(dateObj, isLive) {
    const h = dateObj.getHours(); const seed = dateObj.getDate() + (isLive ? h : 0);
    const zfg = [1,2,3,4,5,6,7,8,9][seed % 9]; const ma = isLive ? BMYIN : BMYANG;
    const si = [1,2,3,4,5,6,7,8,9].indexOf(zfg); const res = {};
    [1,2,3,4,5,6,7,8,9].forEach((g,i)=>{ res[g] = ma[(si+i)%9]; }); return res;
}

let deadDateObj = new Date(2007,5,11,11,0);
let liveDateObj = new Date();

function setNow() {
  const now = new Date();
  const local = new Date(now.getTime() - now.getTimezoneOffset()*60000);
  document.getElementById('live-time').value = local.toISOString().slice(0,16);
  liveDateObj = now;
}

function initMap() {
  setNow();
  map = L.map('map',{zoomControl:false, attributionControl:false}).setView(CENTER, 17);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:20}).addTo(map);
  
  // 绑定动态文字缩放事件 (核心修复)
  map.on('zoom', function() {
      const baseZoom = 17; 
      const currentZoom = map.getZoom();
      const scale = Math.pow(1.3, currentZoom - baseZoom);
      document.documentElement.style.setProperty('--label-scale', scale);
  });
  
  l1Group = L.layerGroup().addTo(map);
  l2Group = L.layerGroup().addTo(map);
  l3Group = L.layerGroup().addTo(map);

  drawL1();
  updateL2L3();
}

function drawL1() {
  l1Group.clearLayers();
  
  // 南江大学亮色发光边界
  L.polygon(campusBounds, { 
      color: 'var(--color-l1)', weight: 3, fillOpacity: 0.05, dashArray: '10 5', opacity: 1
  }).addTo(l1Group);

  // 绘制校园内虚构的几座建筑拓扑蓝图 (增强现实感)
  const buildings = [
      [[CENTER[0]+0.0004, CENTER[1]-0.0006], [CENTER[0]+0.0009, CENTER[1]+0.0006]], // 主楼/图书馆
      [[CENTER[0]+0.0002, CENTER[1]+0.0010], [CENTER[0]+0.0008, CENTER[1]+0.0013]], // 教学楼群
      [[CENTER[0]-0.0005, CENTER[1]+0.0010], [CENTER[0]+0.0001, CENTER[1]+0.0013]], 
      [[CENTER[0]+0.0010, CENTER[1]-0.0020], [CENTER[0]+0.0014, CENTER[1]-0.0015]], // 宿舍区
      [[CENTER[0]+0.0010, CENTER[1]-0.0014], [CENTER[0]+0.0014, CENTER[1]-0.0009]],
      [[CENTER[0]-0.0012, CENTER[1]-0.0022], [CENTER[0]+0.0002, CENTER[1]-0.0012]], // 操场区域
      [[CENTER[0]-0.0010, CENTER[1]+0.0008], [CENTER[0]-0.0015, CENTER[1]+0.0015]], // 食堂
      [[CENTER[0]-SPAN-0.0002, CENTER[1]-0.0004], [CENTER[0]-SPAN+0.0002, CENTER[1]+0.0004]] // 废弃仓库
  ];

  buildings.forEach(b => {
      L.rectangle(b, {
          color: 'var(--color-l1)', weight: 1, fillColor: 'var(--bg-panel)', fillOpacity: 0.6
      }).addTo(l1Group);
  });
  
  // 中心阵眼
  L.marker(CENTER, {icon: L.divIcon({
    html: `<div class="map-label-l1 highlight-zone">南江大学核心阵眼</div>`,
    className: '', iconAnchor: [60, 15]
  })}).addTo(l1Group);

  // 严格正南方 (离九宫区域) 的废弃仓库
  L.marker([CENTER[0]-SPAN, CENTER[1]], {icon: L.divIcon({
    html: `<div class="map-label-l1 danger">南门废弃仓库</div>`,
    className: '', iconAnchor: [50, 15]
  })}).addTo(l1Group);
}

function updateL2L3() {
  l2Group.clearLayers();
  l3Group.clearLayers();

  const deadMen = pseudoCalc(deadDateObj, false);
  const liveMen = pseudoCalc(liveDateObj, true);

  Object.entries(GONG_OFF).forEach(([posStr, [dlat, dlng]]) => {
    const pos = parseInt(posStr);
    const lat = CENTER[0] + dlat, lng = CENTER[1] + dlng;
    const dm = deadMen[pos], lm = liveMen[pos];
    const conflict = (dm === lm);

    const bounds = [[lat-SPAN/2, lng-SPAN/2], [lat+SPAN/2, lng+SPAN/2]];
    
    L.rectangle(bounds, {
      color: conflict ? '#ffffff' : 'var(--color-l2)', 
      fillOpacity: conflict ? 0.2 : 0, 
      weight: conflict ? 2 : 1
    }).addTo(l2Group);

    if(!conflict) {
      const boundsL3 = [[lat-SPAN/2+0.0001, lng-SPAN/2+0.0001], [lat+SPAN/2-0.0001, lng+SPAN/2-0.0001]];
      L.rectangle(boundsL3, {
        color: 'var(--color-l3)', fillOpacity: 0, weight: 1.5, dashArray: '4 4'
      }).addTo(l3Group);
    }

    L.marker([lat, lng], {icon: L.divIcon({
      html: `<div class="gong-label" style="color:${conflict?'#fff':'#6c8299'}; text-shadow:${conflict?'0 0 5px #fff':'0 0 2px #000'};">${NAMES[pos]}${pos}宫<br><span style="font-size:0.8em">${dm}</span></div>`,
      className: '', iconAnchor: [20, 20]
    })}).addTo(l2Group);
  });
}

function toggleLayer(layerName) {
    layersState[layerName] = !layersState[layerName];
    const btn = document.getElementById(`btn-${layerName.toLowerCase()}`);
    
    if (layersState[layerName]) {
        btn.classList.add('active');
        if(layerName==='L1') map.addLayer(l1Group);
        if(layerName==='L2') map.addLayer(l2Group);
        if(layerName==='L3') map.addLayer(l3Group);
    } else {
        btn.classList.remove('active');
        if(layerName==='L1') map.removeLayer(l1Group);
        if(layerName==='L2') map.removeLayer(l2Group);
        if(layerName==='L3') map.removeLayer(l3Group);
    }
}

document.getElementById('use-now-btn').onclick = () => { setNow(); updateL2L3(); };
document.getElementById('apply-dead').onclick = () => { if(document.getElementById('dead-time').value){ deadDateObj = new Date(document.getElementById('dead-time').value); updateL2L3(); } };
document.getElementById('apply-live').onclick = () => { if(document.getElementById('live-time').value){ liveDateObj = new Date(document.getElementById('live-time').value); updateL2L3(); } };
</script>
