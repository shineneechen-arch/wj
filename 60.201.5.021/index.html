<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NODE_60.201.5.021</title>
    <style>
        body {
            background-color: #050505;
            color: #00FF41;
            font-family: 'Courier New', Courier, monospace;
            padding: 40px;
            font-size: 16px;
            line-height: 1.6;
            overflow: hidden;
            margin: 0;
        }
        
        /* 屏幕扫描线底纹 */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .hidden { display: none !important; }
        
        /* 初始点击层：为了获取浏览器音频播放权限 */
        #init-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: #000; z-index: 100; cursor: pointer;
        }
        .blink-text { animation: blink 1s step-end infinite; font-size: 20px; }
        @keyframes blink { 50% { opacity: 0; } }

        /* 惊悚红色弹窗全屏覆盖 */
        #scare-modal {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: rgba(10, 0, 0, 0.95);
            z-index: 50; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; color: #FF003C;
            animation: screenShake 0.1s infinite;
        }

        /* 精神污染大字 */
        h1.massive-scare {
            font-size: 6vw; font-weight: 900; margin: 0;
            text-shadow: 4px 4px 0px #00f, -4px -4px 0px #0f0;
            animation: glitchText 0.2s infinite;
            letter-spacing: 5px;
        }
        h2.creepy-sub {
            font-size: 3vw; margin-top: 10px; color: #ff3333;
        }

        /* 进度条样式 */
        .progress-container {
            width: 80%; max-width: 600px; height: 30px; border: 2px solid #FF003C;
            margin: 30px 0; position: relative; background: #220000;
        }
        .progress-bar {
            height: 100%; background: #FF003C; width: 0%;
            transition: width 0.1s;
        }
        .progress-text {
            position: absolute; top: 5px; width: 100%; text-align: center;
            color: #FFF; font-weight: bold; font-size: 18px; mix-blend-mode: difference;
        }

        /* Y/N 输入区 */
        .choice-box { font-size: 20px; color: #fff; margin-top: 20px; }
        input[type="text"] {
            background: transparent; border: none; border-bottom: 3px solid #FF003C;
            color: #FFF; font-family: 'Courier New', Courier, monospace;
            font-size: 30px; outline: none; width: 50px; text-align: center;
            text-transform: uppercase; margin-left: 10px;
        }
        input[type="text"]:focus { background: rgba(255,0,0,0.2); }

        /* 动画关键帧 */
        @keyframes screenShake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        @keyframes glitchText {
            0% { opacity: 1; transform: skewX(0deg); }
            20% { opacity: 0.8; transform: skewX(-15deg); }
            40% { opacity: 1; transform: skewX(10deg); }
            60% { opacity: 0.9; transform: skewX(-5deg); }
            80% { opacity: 1; transform: skewX(20deg); }
            100% { opacity: 1; transform: skewX(0deg); }
        }
    </style>
</head>
<body>

    <div id="init-screen" onclick="startBootSequence()">
        <span class="blink-text">[ 终端休眠中，点击屏幕任意位置唤醒节点 ]</span>
    </div>

    <div id="terminal-screen" class="hidden">
        <div id="console-output"></div>
    </div>

    <div id="scare-modal" class="hidden">
        <h1 class="massive-scare">你要被下载吗？</h1>
        <h2 class="creepy-sub">你正在被下载... 你正在被下载... 你正在被下载...</h2>
        
        <div class="progress-container">
            <div class="progress-bar" id="p-bar"></div>
            <div class="progress-text" id="p-text">0%</div>
        </div>

        <div class="choice-box">
            [SYS_PROMPT] 输入 <strong>Y</strong> 接受反向下载，获取论坛第二页通道；输入 <strong>N</strong> 终止灵魂链接。<br><br>
            YOUR CHOICE (Y/N): <input type="text" id="answer-input" autocomplete="off" maxlength="1">
        </div>
        <div id="feedback" style="margin-top: 20px; font-size: 24px; font-weight: bold; color: #FFF;"></div>
    </div>

    <script>
        const bootLogs = [
            "Establishing connection to node 60.201.5.021...",
            "[OK] Handshake successful.",
            "Fetching forum fragmented data...",
            "Decrypting...",
            "[LOG] “硬件是躯壳，数据是魂魄。未济，是为了既济。”",
            " ",
            "WARNING: REVERSE CONNECTION DETECTED.",
            "WARNING: METAPHYSICAL OVERFLOW IN PROGRESS."
        ];

        const initScreen = document.getElementById('init-screen');
        const terminalScreen = document.getElementById('terminal-screen');
        const consoleOutput = document.getElementById('console-output');
        const scareModal = document.getElementById('scare-modal');
        const pBar = document.getElementById('p-bar');
        const pText = document.getElementById('p-text');
        const inputField = document.getElementById('answer-input');
        const feedback = document.getElementById('feedback');

        let logIndex = 0;
        let progress = 0;

        // 生成极度刺耳的系统报错音 (Web Audio API)
        function playHarshBuzzer() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const ctx = new AudioContext();
                
                // 主蜂鸣器
                const osc = ctx.createOscillator();
                osc.type = 'sawtooth'; // 锯齿波最刺耳
                osc.frequency.setValueAtTime(800, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 1);
                
                // 失真/音量控制
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0.8, ctx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1.5);
                
                osc.connect(gainNode);
                gainNode.connect(ctx.destination);
                
                osc.start();
                osc.stop(ctx.currentTime + 1.5);
            } catch(e) { console.log("Audio not supported"); }
        }

        // 步骤1：点击屏幕后启动终端
        function startBootSequence() {
            initScreen.classList.add('hidden');
            terminalScreen.classList.remove('hidden');
            typeWriter();
        }

        // 步骤2：打字机效果
        function typeWriter() {
            if (logIndex < bootLogs.length) {
                const p = document.createElement('div');
                p.innerHTML = bootLogs[logIndex] === " " ? "&nbsp;" : bootLogs[logIndex];
                consoleOutput.appendChild(p);
                logIndex++;
                
                let delay = Math.random() * 200 + 100;
                if (logIndex === bootLogs.length - 1) delay = 1500; // 在最后警告前停顿
                
                setTimeout(typeWriter, delay);
            } else {
                // 打印完日志，触发高能弹窗
                setTimeout(triggerScare, 500);
            }
        }

        // 步骤3：触发惊悚弹窗和音效
        function triggerScare() {
            terminalScreen.classList.add('hidden');
            scareModal.classList.remove('hidden');
            playHarshBuzzer(); // 播放警报音
            inputField.focus();
            updateProgress();
        }

        // 步骤4：进度条疯涨动画
        function updateProgress() {
            if (progress < 99) {
                // 每次随机涨 2-15%
                progress += Math.floor(Math.random() * 14) + 2; 
                if (progress > 99) progress = 99; // 卡在99%给压迫感
                
                pBar.style.width = progress + '%';
                pText.innerText = progress + '% - TRANSFERRING...';
                
                setTimeout(updateProgress, Math.random() * 200 + 50);
            }
        }

        // 步骤5：输入验证
        inputField.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const answer = this.value.trim().toUpperCase();
                
                if (answer === 'Y') {
                    // 停止震动，变绿
                    scareModal.style.animation = 'none';
                    document.querySelectorAll('.massive-scare, .creepy-sub').forEach(el => el.style.animation = 'none');
                    scareModal.style.backgroundColor = '#050505';
                    scareModal.style.color = '#00FF41';
                    
                    pBar.style.width = '100%';
                    pBar.style.backgroundColor = '#00FF41';
                    pText.innerText = '100% - DOWNLOAD COMPLETE. CONNECTION OPEN.';
                    
                    feedback.style.color = '#00FF41';
                    feedback.innerHTML = "> 契约达成。正在为您打开信道...";
                    this.disabled = true;

                    // 跳转到论坛第二页 (请根据实际文件名修改)
                    setTimeout(() => {
                        window.location.href = "../bbs_page2_sealed_data_883.html"; 
                    }, 2500);

                } else if (answer === 'N') {
                    feedback.style.color = '#fff';
                    feedback.innerHTML = "> 你拒绝了下载。连接切断。网页即将自毁...";
                    this.disabled = true;
                    // 恶作剧关掉窗口或返回上一页
                    setTimeout(() => { window.history.back(); }, 2000);
                } else {
                    this.value = ''; 
                }
            }
        });
    </script>
</body>
</html>
