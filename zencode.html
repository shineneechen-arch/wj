<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Z̸e̸n̸C̸o̸d̸e̸ · 命̸運̸封̸存̸</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+TC:wght@300;400;500;700;900&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#d32f2f;--gold-b:#ff003c;--gold-dim:rgba(211,47,47,0.18);
  --bg:#030000;--text:#e0e0e0;--text-d:rgba(255,100,100,0.52);--text-f:rgba(255,0,60,0.4);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{background:var(--bg);color:var(--text);font-family:'Noto Serif TC',serif;overflow-x:hidden;min-height:100vh;}

/* 故障乱码闪烁动画 */
@keyframes glitch-anim {
  0% { transform: translate(0) }
  20% { transform: translate(-2px, 1px) }
  40% { transform: translate(-1px, -1px) }
  60% { transform: translate(2px, 1px) }
  80% { transform: translate(1px, -1px) }
  100% { transform: translate(0) }
}
.glitch-active { 
    animation: glitch-anim 0.1s infinite; 
    color: #ff003c !important; 
    text-shadow: -2px 0 #00ff00, 2px 0 #0000ff !important; 
}

#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none; filter: contrast(1.5) saturate(1.2);}
.grid-ov{position:fixed;inset:0;z-index:1;pointer-events:none;
  background-image:linear-gradient(rgba(211,47,47,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(211,47,47,0.05) 1px,transparent 1px);
  background-size:64px 64px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 20%,transparent 100%);}
.scan{position:fixed;top:0;left:0;right:0;height:4px;z-index:2;pointer-events:none;
  background:linear-gradient(90deg,transparent,rgba(255,0,0,0.2),rgba(255,0,0,0.6),rgba(255,0,0,0.2),transparent);
  animation:scan 4s linear infinite;}
@keyframes scan{0%{top:-4px}100%{top:100vh}}

@keyframes fsd{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:none}}
@keyframes fsu{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes fi{from{opacity:0}to{opacity:1}}

.page{position:relative;z-index:10;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px 80px;width:100%;}
.header{text-align:center;margin-bottom:52px;width:100%;max-width:860px;display:flex;flex-direction:column;align-items:center;}
.h-tag{display:inline-flex;align-items:center;gap:12px;font-family:'Noto Sans TC',sans-serif;font-size:0.63rem;letter-spacing:0.55em;color:var(--gold);text-transform:uppercase;margin-bottom:20px;opacity:0;animation:fsd .8s ease .2s forwards;}
.h-tag::before,.h-tag::after{content:'';width:30px;height:1px;background:linear-gradient(90deg,transparent,var(--gold));}
.h-tag::after{transform:scaleX(-1);}
.t-wrap{position:relative;display:block;width:100%;text-align:center;margin-bottom:14px;opacity:0;animation:fsd .9s ease .35s forwards;}
.t-main{font-family:'Ma Shan Zheng',cursive;font-size:clamp(3rem,6.5vw,5rem);line-height:1;letter-spacing:0.1em;display:block;width:100%;
  background:linear-gradient(160deg,#8b0000 0%,#ff003c 38%,#4a0000 68%,#d32f2f 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 25px rgba(255,0,0,0.6));}
.t-glow{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 65%,rgba(255,0,0,0.2) 0%,transparent 70%);filter:blur(22px);pointer-events:none;}
.t-sub{font-size:0.82rem;letter-spacing:0.38em;color:var(--text-d);font-family:'Noto Sans TC',sans-serif;opacity:0;animation:fsd 1s ease .5s forwards;}
.hdiv{width:280px;height:1px;margin:30px auto 40px;background:linear-gradient(90deg,transparent,var(--gold),transparent);position:relative;opacity:0;animation:fi 1s ease .6s forwards;}
.hdiv::before{content:'✦';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:0.65rem;color:var(--gold);background:var(--bg);padding:0 8px;}

.form-card{width:100%;max-width:460px;background:rgba(10,0,0,0.88);border:1px solid var(--gold-dim);padding:44px 40px 40px;position:relative;backdrop-filter:blur(24px);
  box-shadow:0 0 0 1px rgba(255,0,0,0.2),0 32px 64px rgba(0,0,0,0.9),0 0 80px rgba(255,0,0,0.1),inset 0 1px 0 rgba(255,0,0,0.15);
  opacity:0;animation:fsu .9s ease .5s forwards;}
.c-tl,.c-tr,.c-bl,.c-br{position:absolute;width:16px;height:16px;border-color:rgba(255,0,0,0.45);border-style:solid;}
.c-tl{top:10px;left:10px;border-width:1px 0 0 1px;}.c-tr{top:10px;right:10px;border-width:1px 1px 0 0;}
.c-bl{bottom:10px;left:10px;border-width:0 0 1px 1px;}.c-br{bottom:10px;right:10px;border-width:0 1px 1px 0;}
.cal-tog{display:flex;margin-bottom:28px;border:1px solid var(--gold-dim);overflow:hidden;}
.cal-btn{flex:1;padding:11px 0;background:transparent;border:none;font-family:'Noto Sans TC',sans-serif;font-size:0.8rem;letter-spacing:0.2em;color:var(--text-d);cursor:pointer;transition:all .3s;position:relative;}
.cal-btn.active{background:rgba(255,0,0,0.15);color:var(--gold-b);}
.cal-btn.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:1px;background:var(--gold);}

.field{display:flex;flex-direction:column;gap:7px;margin-bottom:22px;}
.flbl{font-family:'Noto Sans TC',sans-serif;font-size:0.64rem;letter-spacing:0.38em;color:var(--gold);text-transform:uppercase;padding-left:1px;display:flex;align-items:center;gap:8px;}
.flbl::before{content:'';width:3px;height:3px;background:var(--gold);transform:rotate(45deg);flex-shrink:0;}
.iw{position:relative;}
.iw::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);transform:scaleX(0);opacity:0;transition:all .4s;}
.iw:focus-within::after{transform:scaleX(1);opacity:1;}
.inp{width:100%;padding:13px 16px;background:rgba(20,0,0,0.5);border:1px solid rgba(255,0,0,0.15);color:var(--text);font-family:'Noto Serif TC',serif;font-size:0.97rem;letter-spacing:0.06em;outline:none;transition:all .3s;-webkit-appearance:none;appearance:none;border-radius:2px;}
.inp::placeholder{color:rgba(150,150,150,0.4);font-size:0.83rem;}
.inp:focus{background:rgba(255,0,0,0.1);border-color:rgba(255,0,0,0.5);box-shadow:0 0 24px rgba(255,0,0,0.2);color:#fff;}
select.inp option{background:#0C0000;color:var(--text);}
.dg3{display:grid;grid-template-columns:2fr 1.2fr 1.2fr;gap:8px;}
.dg2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.sl3{display:grid;grid-template-columns:2fr 1.2fr 1.2fr;gap:8px;margin-bottom:5px;}
.sl2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:5px;margin-top:10px;}
.slbl{font-family:'Noto Sans TC',sans-serif;font-size:0.58rem;letter-spacing:0.25em;color:var(--text-f);text-align:center;}
.inp.c{text-align:center;padding-left:8px;padding-right:8px;}
.lunar-h{font-family:'Noto Sans TC',sans-serif;font-size:0.68rem;color:rgba(211,47,47,0.8);letter-spacing:0.1em;margin-top:5px;display:none;}
.lunar-h.show{display:block;}
.solar-hint{font-family:'Noto Sans TC',sans-serif;font-size:0.67rem;color:rgba(255,0,0,0.7);letter-spacing:0.08em;margin-top:6px;padding:7px 10px;background:rgba(255,0,0,0.05);border-left:2px solid rgba(255,0,0,0.6);display:none;}
.solar-hint.show{display:block;}

/* 按钮战损锁定/解锁状态 */
.sbtn{width:100%;padding:17px;background:#1a0505;color:#555;border:1px solid #401010;border-radius:2px;font-family:'Ma Shan Zheng',cursive;font-size:1.25rem;letter-spacing:5px;cursor:not-allowed;position:relative;overflow:hidden;transition:all .3s;}
.sbtn.unlocked{
    background:linear-gradient(135deg,#5A0A0A 0%,#ff003c 55%,#8B0000 100%);
    color:#fff; cursor:pointer; border:1px solid #ff003c;
    box-shadow:0 6px 32px rgba(255,0,0,0.6); animation:pulse-red 1.3s infinite;
}
@keyframes pulse-red { 0% {box-shadow: 0 0 10px #8b0000;} 50% {box-shadow: 0 0 35px #ff003c;} 100% {box-shadow: 0 0 10px #8b0000;} }

.bazi-prev{margin:18px 0;background:rgba(255,0,0,0.03);border:1px solid rgba(255,0,0,0.15);padding:18px 16px 14px;display:none;animation:fsu .4s ease both;}
.bazi-prev.show{display:block;}
.bp-hd{text-align:center;font-family:'Noto Sans TC',sans-serif;font-size:0.58rem;letter-spacing:0.45em;color:var(--gold-b);margin-bottom:14px;display:flex;align-items:center;gap:10px;justify-content:center;}
.bp-hd::before,.bp-hd::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(255,0,0,0.3));}
.bp-hd::after{transform:scaleX(-1);}
.bp-ps{display:flex;gap:3px;justify-content:center;}
.bp-p{display:flex;flex-direction:column;align-items:center;background:rgba(0,0,0,0.6);border:1px solid rgba(255,0,0,0.2);padding:10px 14px 8px;min-width:62px;}
.bp-l{font-family:'Noto Sans TC',sans-serif;font-size:0.53rem;color:var(--text-f);letter-spacing:0.2em;margin-bottom:7px;}
.bp-t, .bp-d{font-family:'Ma Shan Zheng',cursive;font-size:1.75rem;line-height:1; color:#ff003c;}
.bp-g{font-family:'Noto Sans TC',sans-serif;font-size:0.51rem;color:#888;margin-top:7px;letter-spacing:0.1em;}
.bp-ex{text-align:center;margin-top:10px;font-family:'Noto Sans TC',sans-serif;font-size:0.63rem;color:rgba(255,0,0,0.4);letter-spacing:0.18em;}

/* 侧边栏及天球仪战损视觉 */
.floating-right-group { position: fixed; right: 40px; top: 50%; transform: translateY(-50%); z-index: 90; display: flex; flex-direction: column; gap: 36px; align-items: center; }
.floating-liuyao, .floating-astrolabe { position: relative; display: flex; flex-direction: column; align-items: center; text-decoration: none; gap: 14px; cursor: pointer; transition: all 0.5s; }
.yinyang-wrapper, .astrolabe-wrapper { width: 58px; height: 58px; border-radius: 50%; box-shadow: 0 0 20px rgba(255,0,0,0.2); display: flex; align-items: center; justify-content: center; background: rgba(15,0,0,0.8); border: 1px solid rgba(255,0,0,0.3); }
.liuyao-text, .astrolabe-text { font-family: 'Noto Sans TC', sans-serif; font-size: 0.65rem; letter-spacing: 0.4em; color: #ff003c; writing-mode: vertical-lr; text-shadow: 0 0 8px rgba(255,0,0,0.5); }
.astro-orbit { animation: spin-orbit 12s linear infinite; transform-origin: center; }
.astro-orbit-reverse { animation: spin-orbit 18s linear infinite reverse; transform-origin: center; }
@keyframes spin-orbit { 100% { transform: rotate(360deg); } }

/* 禁用原生DST行 */
.dst-row, .dst-panel, #roc { display: none !important; }
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="grid-ov"></div>
<div class="scan"></div>

<div class="floating-right-group">
  <a href="#" class="floating-liuyao" onclick="alert('【錯誤】數據重組鏈接丟失。');return false;">
    <div class="yinyang-wrapper">
      <svg viewBox="0 0 100 100" style="width:82%;height:82%;animation:spin-orbit 16s linear infinite; filter: drop-shadow(0 0 4px #ff003c);">
        <path d="M50,2 A48,48 0 0,1 50,98 A24,24 0 0,1 50,50 A24,24 0 0,0 50,2 Z" fill="#8b0000"/>
        <path d="M50,2 A48,48 0 0,0 50,98 A24,24 0 0,0 50,50 A24,24 0 0,1 50,2 Z" fill="#030000"/>
        <circle cx="50" cy="26" r="6" fill="#030000"/>
        <circle cx="50" cy="74" r="6" fill="#ff003c"/>
        <circle cx="50" cy="50" r="49" fill="none" stroke="#ff003c" stroke-width="1" opacity="0.6"/>
      </svg>
    </div>
    <span class="liuyao-text">六爻排盤</span>
  </a>
</div>

<a href="#" class="floating-astrolabe" onclick="alert('【警告】坐標觀測系已被外部干擾源封鎖。');return false;" style="position:fixed;left:40px;top:50%;transform:translateY(-50%);">
  <div class="astrolabe-wrapper">
    <svg viewBox="0 0 100 100" width="82%" height="82%" style="filter: drop-shadow(0 0 4px #ff003c);">
      <circle cx="50" cy="50" r="46" fill="none" stroke="#ff003c" stroke-width="0.5" stroke-dasharray="2 4"/>
      <ellipse cx="50" cy="50" rx="42" ry="14" fill="none" stroke="#ff003c" stroke-width="1.5" class="astro-orbit" transform="rotate(30 50 50)"/>
      <ellipse cx="50" cy="50" rx="42" ry="14" fill="none" stroke="#8b0000" stroke-width="1.5" class="astro-orbit-reverse" transform="rotate(-45 50 50)"/>
      <circle cx="50" cy="50" r="8" fill="#ff003c"/>
    </svg>
  </div>
  <span class="astrolabe-text">立體天球儀</span>
</a>

<div id="ifc" class="page">
  <div class="header">
    <div class="h-tag">Z̸e̸n̸C̸o̸d̸e̸ · 命̸運̸封̸存̸</div>
    <div class="t-wrap">
      <div class="t-glow"></div>
      <h1 class="t-main">讀取殘缺檔案</h1>
    </div>
    <div class="t-sub">警告：底層算力已被劫持...</div>
  </div>
  <div class="hdiv"></div>

  <div class="form-card">
    <div class="c-tl"></div><div class="c-tr"></div><div class="c-bl"></div><div class="c-br"></div>

    <div class="cal-tog">
      <button class="cal-btn active" id="bsol" onclick="setCalType('solar')">公曆</button>
      <button class="cal-btn" id="blun" onclick="setCalType('lunar')">農曆</button>
    </div>

    <div class="field">
      <div class="flbl">祭品標識 (姓名)</div>
      <div class="iw"><input type="text" id="un" class="inp" placeholder="輸入..." autocomplete="off"></div>
    </div>
    <div class="field">
      <div class="flbl">陰陽屬性</div>
      <div class="iw">
        <select id="ug" class="inp">
          <option value="女">陰 (女)</option>
          <option value="男">陽 (男)</option>
        </select>
      </div>
    </div>
    <div class="field">
      <div class="flbl">入局節點 (出生日期)</div>
      <div class="lunar-h" id="lh">✦ 請輸入農曆年月日，系統自動換算公曆</div>
      <div class="sl3">
        <div class="slbl" id="lby">年</div>
        <div class="slbl" id="lbm">月</div>
        <div class="slbl" id="lbd">日</div>
      </div>
      <div class="dg3">
        <div class="iw"><input type="number" id="by" class="inp c" placeholder="1998" oninput="odc()"></div>
        <div class="iw"><input type="number" id="bm" class="inp c" placeholder="11" oninput="odc()"></div>
        <div class="iw"><input type="number" id="bd" class="inp c" placeholder="14" oninput="odc()"></div>
      </div>
      <div id="leap-wrap" style="display:none;margin-top:8px;">
        <label style="display:flex;align-items:center;gap:8px;font-family:'Noto Sans TC',sans-serif;font-size:0.73rem;color:var(--text-d);cursor:pointer;">
          <input type="checkbox" id="ilp" onchange="odc()" style="accent-color:var(--gold);width:14px;height:14px;"> <span>閏月</span>
        </label>
      </div>
      <div class="sl2">
        <div class="slbl">時（24h）</div>
        <div class="slbl">分</div>
      </div>
      <div class="dg2">
        <div class="iw"><input type="number" id="bh" class="inp c" placeholder="12" oninput="odc()"></div>
        <div class="iw"><input type="number" id="bmin" class="inp c" placeholder="00" oninput="odc()"></div>
      </div>
    </div>

    <div class="field" style="margin-top:4px;">
      <div class="flbl">地理經緯錨點</div>
      <div class="iw">
        <input type="text" id="ubp" class="inp" placeholder="如：杭州 或 四川" autocomplete="off" oninput="odc()">
      </div>
      <div class="solar-hint show" id="solar-hint"></div>
    </div>

    <div class="bazi-prev" id="bprev">
      <div class="bp-hd">陣法能量解譯中...</div>
      <div class="bp-ps" id="bpps"></div>
      <div class="bp-ex" id="bpex"></div>
    </div>

    <div class="btn-row">
      <button class="sbtn" id="sbtn" disabled onclick="submitCorrupted()">陣法錨點缺失...</button>
    </div>

  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════
   战损故障动效脚本
═══════════════════════════════════════════════════════ */
setInterval(() => {
    const els = document.querySelectorAll('.flbl, .slbl, .t-main');
    if(!els.length) return;
    const target = els[Math.floor(Math.random() * els.length)];
    const orig = target.innerText;
    target.classList.add('glitch-active');
    target.innerText = '死亡数据'.slice(0, orig.length);
    setTimeout(() => {
        target.classList.remove('glitch-active');
        target.innerText = orig;
    }, 150);
}, 2500);

/* --- 背景红煞闪烁绘制 --- */
const c=document.getElementById('bg-canvas'),ctx=c.getContext('2d');
let W,H,stars=[];
function resize(){W=c.width=innerWidth;H=c.height=innerHeight;}
resize();addEventListener('resize',resize);
for(let i=0;i<60;i++) stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5,sp:Math.random()*0.02});
function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='rgba(15,0,0,0.03)';
  ctx.fillRect(0,0,W,H);
  stars.forEach(s=>{
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=Math.random()>0.95?'#ff003c':'#330000';
    ctx.fill();
  });
  requestAnimationFrame(draw);
}
draw();

let calType='solar';
function setCalType(t){
  calType=t;
  document.getElementById('bsol').classList.toggle('active',t==='solar');
  document.getElementById('blun').classList.toggle('active',t==='lunar');
  document.getElementById('lh').classList.toggle('show',t==='lunar');
  document.getElementById('leap-wrap').style.display=t==='lunar'?'block':'none';
  odc();
}

function lunarToSolar(ly,lm,ld,isLeap){
  const d=LD[ly];if(!d)return null; const[smmd,bits,leapM]=d; const sm=Math.floor(smmd/100),sd=smmd%100;
  const months=[];
  for(let m=1;m<=12;m++){
    const big=(bits>>(11-(m-1)))&1;months.push({m,days:big?30:29,leap:false});
    if(m===leapM&&leapM>0)months.push({m,days:29,leap:true});
  }
  let off=0,found=false;
  for(const mi of months){
    const tm=isLeap?leapM:lm,tl=isLeap?mi.leap:!mi.leap;
    if(mi.m===tm&&tl){off+=ld-1;found=true;break;}
    off+=mi.days;
  }
  if(!found)return null;
  const base=new Date(ly,sm-1,sd);base.setDate(base.getDate()+off);
  return{year:base.getFullYear(),month:base.getMonth()+1,day:base.getDate()};
}

const TG=['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const DZ=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
function jdn(y,m,d){const a=Math.floor((14-m)/12),yr=y+4800-a,mo=m+12*a-3;return d+Math.floor((153*mo+2)/5)+365*yr+Math.floor(yr/4)-Math.floor(yr/100)+Math.floor(yr/400)-32045;}

const JQTBL_PRECISE={
  2007:[[5,23,43],[4,6,18],[5,23,8],[5,17,4],[6,11,56],[6,7,56],[7,3,20],[7,0,31],[8,16,8],[8,20,7],[8,0,50],[7,17,14]]
};
function getJQPrecise(year, mIdx){
  let y=year; while(y>=1950&&!JQTBL_PRECISE[y])y--;
  const r=(JQTBL_PRECISE[y]||JQTBL_PRECISE[2007])[mIdx];
  return{day:r[0],hour:r[1],minute:r[2]};
}

/* 根据地名获取精准坐标（集成真太阳时锁） */
function getLng(birthplace){
  if(!birthplace)return null;
  if(birthplace.includes('杭州')) return 120.21;
  if(birthplace.includes('四川')) return 102.50;
  if(birthplace.includes('北京')) return 116.4;
  if(birthplace.includes('成都')) return 104.1;
  return 120.0; // 默认北京时间经度
}

function correctSolarTime(hour, minute, birthplace, tzOffset=8){
  const lng = getLng(birthplace);
  if(lng===null)return{hour,minute,adjusted:false,diffMin:0};
  const diffMin=Math.round(lng*4 - tzOffset*60);
  const total=((hour*60+minute+diffMin)%1440+1440)%1440;
  return{hour:Math.floor(total/60),minute:Math.floor(total%60),adjusted:true,diffMin};
}

function getYrGZ(year, month, day, hour=12, minute=0){
  const lc = getJQPrecise(year, 1);
  const targetMins = day * 1440 + hour * 60 + minute;
  const lcMins = lc.day * 1440 + lc.hour * 60 + lc.minute;
  let y = year; if (month < 2 || (month === 2 && targetMins < lcMins)) y = year - 1;
  return { tg: ((y - 4) % 10 + 10) % 10, dz: ((y - 4) % 12 + 12) % 12 };
}

function getMoGZ(year, month, day, hour=12, minute=0){
  const jq=getJQPrecise(year,month-1);
  const targetMins=day*1440+hour*60+minute;
  const jqMins=jq.day*1440+jq.hour*60+jq.minute;
  let sm=month,sy=year;
  if(targetMins<jqMins){sm--; if(sm===0){sm=12;sy--;}}
  const dz=sm%12; const cmd_m=(sm+10)%12+1;
  let yrTg=sy; if(sm===1)yrTg=sy-1;
  const yt=((yrTg-4)%10+10)%10; const base=[2,4,6,8,0][yt%5];
  return{tg:(base+cmd_m-1)%10, dz};
}

function getDayGZ(year,month,day){
  const diff=jdn(year,month,day)-jdn(2000,1,7);
  return{tg:((diff%10)+10)%10,dz:((diff%12)+12)%12};
}

function getHrGZ(hour,dayTg){
  const dz=Math.floor((hour+1)/2)%12; const base=[0,2,4,6,8][dayTg%5];
  return{tg:(base+dz)%10,dz};
}

function calcBazi(year,month,day,hour,minute,birthplace){
  const st = correctSolarTime(hour, minute, birthplace, 8);
  let ah = st.hour, am = st.minute;
  let calcYear = year, calcMonth = month, calcDay = day;
  if (ah >= 23) {
    const dateObj = new Date(Date.UTC(year, month - 1, day));
    dateObj.setUTCDate(dateObj.getUTCDate() + 1);
    calcYear = dateObj.getUTCFullYear(); calcMonth = dateObj.getUTCMonth() + 1; calcDay = dateObj.getUTCDate();
  }
  const yGZ = getYrGZ(calcYear, calcMonth, calcDay, ah, am);
  const mGZ = getMoGZ(calcYear, calcMonth, calcDay, ah, am);
  const dGZ = getDayGZ(calcYear, calcMonth, calcDay);
  const hGZ = getHrGZ(ah, dGZ.tg);
  return [
    {label:'年', tg:TG[yGZ.tg], dz:DZ[yGZ.dz]},
    {label:'月', tg:TG[mGZ.tg], dz:DZ[mGZ.dz]},
    {label:'日', tg:TG[dGZ.tg], dz:DZ[dGZ.dz]},
    {label:'時', tg:TG[hGZ.tg], dz:DZ[hGZ.dz]}
  ];
}

/* ═══════════════════════════════════════════════════════
   动态核心监测逻辑 (odc)
═══════════════════════════════════════════════════════ */
function odc(){
  let y=parseInt(document.getElementById('by').value)||0;
  let m=parseInt(document.getElementById('bm').value)||0;
  let d=parseInt(document.getElementById('bd').value)||0;
  let h=parseInt(document.getElementById('bh').value)||0;
  let mn=parseInt(document.getElementById('bmin').value)||0;
  const bp=document.getElementById('ubp').value.trim();
  const btn = document.getElementById('sbtn');
  const stHint = document.getElementById('solar-hint');

  if(!y||!m||!d){ document.getElementById('bprev').classList.remove('show'); stHint.style.display='none'; return; }

  // 1. 农历转公历处理
  if(calType==='lunar'){
    const s=lunarToSolar(y,m,d,document.getElementById('ilp').checked);
    if(!s){ document.getElementById('bprev').classList.remove('show'); return; }
    y=s.year; m=s.month; d=s.day;
  }

  // 2. 动态展示要求的真太阳时校正文本
  if(bp){
    if(bp.includes('杭州')){
      stHint.textContent = `✦ 經度 120.21° → 真太陽時偏差 +1 分`;
      stHint.style.display = 'block';
    } else if(bp.includes('四川')){
      stHint.textContent = `✦ 經度 102.50° → 真太陽時偏差 -70 分`;
      stHint.style.display = 'block';
    } else {
      const lng = getLng(bp);
      const diffMin = Math.round((lng - 120) * 4);
      stHint.textContent = `✦ 經度 ${lng.toFixed(2)}° → 真太陽時偏差 ${diffMin >= 0 ? '+' : ''}${diffMin} 分`;
      stHint.style.display = 'block';
    }
  } else {
    stHint.style.display = 'none';
  }

  // 3. 全量排盘引擎计算
  try {
    const pillars = calcBazi(y,m,d,h,mn,bp);
    const baziStr = pillars.map(p=>p.tg+p.dz).join(' ');

    // 渲染战损盘面
    document.getElementById('bpps').innerHTML=pillars.map(p=>`
      <div class="bp-p">
        <div class="bp-l">${p.label}</div>
        <div class="bp-t">${p.tg}</div>
        <div class="bp-d">${p.dz}</div>
      </div>`).join('');
    document.getElementById('bpex').textContent = baziStr;
    document.getElementById('bprev').classList.add('show');

    // 4. 精准比对解谜密码锁
    const condA = baziStr === '丁亥 丙午 丙子 甲午' && bp.includes('杭州');
    const condB = baziStr === '丁亥 丙午 丙子 癸巳' && bp.includes('四川');

    if (condA || condB) {
        btn.disabled = false;
        btn.classList.add('unlocked');
        btn.textContent = '【 警告：提取獻祭者檔案 】';
    } else {
        btn.disabled = true;
        btn.classList.remove('unlocked');
        btn.textContent = '陣法錨點缺失...';
    }
  } catch(e) {
    document.getElementById('bprev').classList.remove('show');
  }
}
